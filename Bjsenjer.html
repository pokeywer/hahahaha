}

function useIsDesktop() {
  const [isDesktop, setIsDesktop] = useState(() => (typeof window !== "undefined" ? window.innerWidth >= 860 : false));
  useEffect(() => {
    const onResize = () => setIsDesktop(window.innerWidth >= 860);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return isDesktop;
}

// ---------------- AUTH SCREEN ----------------
function AuthScreen({ accounts, onSignup, onLogin, canInstallPrompt, onInstallClick }) {
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [showInstructions, setShowInstructions] = useState(false);

  const isIOS = typeof navigator !== "undefined" && /iPad|iPhone|iPod/.test(navigator.userAgent);

  const handleInstall = () => {
    if (canInstallPrompt) onInstallClick();
    else setShowInstructions(true);
  };

  const submit = async (e) => {
    if (e && e.preventDefault) e.preventDefault();
    const uname = username.trim();
    const pw = password.trim();
    if (!uname || !pw) {
      setError("Fill in both fields to continue.");
      return;
    }
    setError("");
    setBusy(true);
    try {
      if (mode === "signup") {
        if (accounts[uname]) {
          setError("That username is taken. Try logging in instead.");
          setBusy(false);
          return;
        }
        await onSignup(uname, pw);
      } else {
        if (!accounts[uname]) {
          setError("No account with that username yet. Sign up first.");
          setBusy(false);
          return;
        }
        if (accounts[uname] !== pw) {
          setError("Wrong password. Try again.");
          setBusy(false);
          return;
        }
        await onLogin(uname);
      }
    } catch (err) {
      setError("Error: " + (err && err.message ? err.message : String(err)));
    }
    setBusy(false);
  };

  return (
    <div style={{ minHeight: "100%", background: `radial-gradient(circle at 20% 0%, ${C.violetSoft}33, transparent 60%), ${C.bg}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: "'Inter', sans-serif" }}>
      <div style={{ marginBottom: 20 }}>
        <Logo size={30} />
      </div>

      <button
        type="button"
        onClick={handleInstall}
        style={{
          display: "flex", alignItems: "center", gap: 7, background: C.panel2,
          border: `1px solid ${C.line}`, borderRadius: 20, padding: "7px 14px",
          color: C.text, fontSize: 12.5, fontWeight: 600, cursor: "pointer", marginBottom: 24,
        }}
      >
        <Download size={14} color={C.mint} />
        Install app
      </button>

      {showInstructions && (
        <div
          onClick={() => setShowInstructions(false)}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 20, padding: 24 }}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{ width: "100%", maxWidth: 320, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: 20 }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, color: C.text, fontSize: 15 }}>Add to Home Screen</span>
              <button onClick={() => setShowInstructions(false)} style={iconBtn}><X size={18} color={C.muted} /></button>
            </div>
            {isIOS ? (
              <p style={{ color: C.muted, fontSize: 13, lineHeight: 1.6, margin: 0 }}>
                Tap the <Share size={13} style={{ display: "inline-flex" }} color={C.text} /> Share button in Safari, then choose <strong style={{ color: C.text }}>"Add to Home Screen."</strong>
              </p>
            ) : (
              <p style={{ color: C.muted, fontSize: 13, lineHeight: 1.6, margin: 0 }}>
                Open your browser menu (⋮) and choose <strong style={{ color: C.text }}>"Add to Home screen"</strong> or <strong style={{ color: C.text }}>"Install app."</strong> If you don't see that option, your browser may not support installing this page directly.
              </p>
            )}
          </div>
        </div>
      )}

      <div style={{ width: "100%", maxWidth: 340, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 18, padding: 24 }}>
        <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 19, margin: "0 0 4px", color: C.text }}>
          {mode === "login" ? "Welcome back" : "Create your account"}
        </h1>
        <p style={{ color: C.muted, fontSize: 13, margin: "0 0 20px" }}>
          {mode === "login" ? "Log in to see your feed and messages." : "Pick a username and password to join."}
        </p>

        <label style={{ fontSize: 12, color: C.muted, display: "block", marginBottom: 6 }}>Username</label>
        <input value={username} onChange={(e) => setUsername(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)} placeholder="yourname" style={inputStyle} autoComplete="username" />

        <label style={{ fontSize: 12, color: C.muted, display: "block", margin: "14px 0 6px" }}>Password</label>
        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)} placeholder="••••••••" style={inputStyle} autoComplete={mode === "login" ? "current-password" : "new-password"} />

        {error && (
          <p style={{ color: C.coral, fontSize: 12.5, marginTop: 12, background: "#FF6F6120", padding: "8px 10px", borderRadius: 8 }}>
            {error}
          </p>
        )}

        <button type="button" onClick={submit} disabled={busy} style={{ ...primaryBtn, opacity: busy ? 0.6 : 1 }}>
          {busy ? "Please wait..." : mode === "login" ? "Log in" : "Create account"}
        </button>

        <p style={{ textAlign: "center", fontSize: 13, color: C.muted, marginTop: 18 }}>
          {mode === "login" ? "New here?" : "Already have an account?"}{" "}
          <span
            onClick={() => { setMode(mode === "login" ? "signup" : "login"); setError(""); }}
            style={{ color: C.mint, cursor: "pointer", fontWeight: 600 }}
          >
            {mode === "login" ? "Create one" : "Log in instead"}
          </span>
        </p>
      </div>
    </div>
  );
}

// ---------------- POST CARD ----------------
function PostCard({ post, avatarUrl, onLike, onComment, onOpenProfile, onDelete, isOwn }) {
  const [draft, setDraft] = useState("");
  const [showComments, setShowComments] = useState(false);
  const [videoFailed, setVideoFailed] = useState(false);
  const [videoLoaded, setVideoLoaded] = useState(false);
  const [showMenu, setShowMenu] = useState(false);
  const menuRef = useRef(null);

  useEffect(() => {
    if (!post.video) return;
    const t = setTimeout(() => {
      setVideoLoaded((loaded) => {
        if (!loaded) setVideoFailed(true);
        return loaded;
      });
    }, 6000);
    return () => clearTimeout(t);
  }, [post.video]);

  useEffect(() => {
    if (!showMenu) return;
    const onDocClick = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) setShowMenu(false);
    };
    document.addEventListener("mousedown", onDocClick);
    return () => document.removeEventListener("mousedown", onDocClick);
  }, [showMenu]);

  const submitComment = () => {
    if (!draft.trim()) return;
    onComment(post.id, draft.trim());
    setDraft("");
  };

  const confirmDelete = () => {
    setShowMenu(false);
    if (window.confirm("Delete this post? This can't be undone.")) onDelete(post.id);
  };

  const showVideo = post.video && !videoFailed;

  return (
    <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, marginBottom: 16, overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px" }}>
        <div
          style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, cursor: onOpenProfile ? "pointer" : "default" }}
          onClick={() => onOpenProfile && onOpenProfile(post.user)}
        >
          <Avatar name={post.user.name} color={post.user.color} imageUrl={avatarUrl} size={36} ring />
          <div style={{ flex: 1 }}>
            <div style={{ color: C.text, fontWeight: 600, fontSize: 13.5 }}>{post.user.name}</div>
            <div style={{ color: C.muted, fontSize: 11 }}>{showVideo ? "Video post" : post.image ? "Photo post" : "Original post"}</div>
          </div>
        </div>
        <div ref={menuRef} style={{ position: "relative" }}>
          <button onClick={() => setShowMenu((s) => !s)} style={iconBtn}>
            <MoreHorizontal size={18} color={C.muted} />
          </button>
          {showMenu && (
            <div style={{ position: "absolute", top: 24, right: 0, background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, overflow: "hidden", zIndex: 5, minWidth: 130 }}>
              {isOwn ? (
                <button onClick={confirmDelete} style={{ display: "block", width: "100%", padding: "10px 14px", background: "none", border: "none", color: C.coral, fontSize: 13, cursor: "pointer", textAlign: "left", whiteSpace: "nowrap" }}>
                  Delete post
                </button>
              ) : (
                <div style={{ padding: "10px 14px", color: C.muted, fontSize: 12.5, whiteSpace: "nowrap" }}>Nothing here yet</div>
              )}
            </div>
          )}
        </div>
      </div>

      <div style={{ position: "relative", height: 280, background: "#000" }}>
        {showVideo ? (
          <video
            key={post.video}
            src={post.video}
            controls
            loop
            muted
            playsInline
            preload="auto"
            onLoadedData={() => setVideoLoaded(true)}
            onCanPlay={() => setVideoLoaded(true)}
            onError={() => setVideoFailed(true)}
            onStalled={() => setVideoFailed(true)}
            style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
          />
        ) : post.image ? (
          <img
            src={post.image}
            alt={post.caption}
            loading="lazy"
            style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
          />
        ) : (
          <div style={{ height: "100%", background: post.gradient, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: "rgba(255,255,255,0.85)", fontSize: 13, letterSpacing: "0.08em", textTransform: "uppercase" }}>
              placeholder image
            </span>
          </div>
        )}
      </div>
      {post.credit && (
        <div style={{ padding: "6px 14px 0", color: C.muted, fontSize: 10.5 }}>{post.credit}</div>
      )}

      <div style={{ padding: "12px 14px" }}>
        <div style={{ display: "flex", gap: 16, marginBottom: 10 }}>
          <button onClick={() => onLike(post.id)} style={iconBtn}>
            <Heart size={22} color={post.likedByMe ? C.coral : C.text} fill={post.likedByMe ? C.coral : "none"} />
          </button>
          <button onClick={() => setShowComments((s) => !s)} style={iconBtn}>
            <MessageSquare size={22} color={C.text} />
          </button>
          <Send size={20} color={C.text} style={{ marginTop: 1 }} />
          <div style={{ flex: 1 }} />
          <Bookmark size={20} color={C.text} />
        </div>

        <div style={{ color: C.text, fontSize: 13.5, fontWeight: 700, marginBottom: 4 }}>{post.likes} likes</div>
        <div style={{ color: C.text, fontSize: 13.5, marginBottom: showComments ? 10 : 0 }}>
          <span style={{ fontWeight: 700 }}>{post.user.name}</span> {post.caption}
        </div>

        {showComments && (
          <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 10 }}>
            {post.comments.length === 0 && <div style={{ color: C.muted, fontSize: 12.5, marginBottom: 8 }}>No comments yet — say something.</div>}
            {post.comments.map((c, i) => (
              <div key={i} style={{ fontSize: 13, color: C.text, marginBottom: 6 }}>
                <span style={{ fontWeight: 700 }}>{c.user}</span> {c.text}

function ProfileScreen({ currentUser, avatarUrl, onAvatarChange, onLogout, posts, toggleLike, addComment, onDeletePost }) {
  const fileRef = useRef(null);
  const [uploading, setUploading] = useState(false);
  const [error, setError] = useState("");
  const ownPosts = posts.filter((p) => p.user.name === currentUser);

  const pickFile = () => fileRef.current && fileRef.current.click();

  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    if (!file.type.startsWith("image/")) {
      setError("Please choose an image file.");
      return;
    }
    setError("");
    setUploading(true);
    const reader = new FileReader();
    reader.onload = () => {
      const img = new window.Image();
      img.onload = () => {
        const size = 300;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        const scale = Math.max(size / img.width, size / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        onAvatarChange(dataUrl);
        setUploading(false);
      };
      img.onerror = () => { setError("Couldn't read that image."); setUploading(false); };
      img.src = reader.result;
    };
    reader.onerror = () => { setError("Couldn't read that file."); setUploading(false); };
    reader.readAsDataURL(file);
  };

  return (
    <div style={{ padding: "20px 18px 90px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 12 }}>
        <div style={{ position: "relative" }} onClick={pickFile}>
          <Avatar name={currentUser} color={C.violet} imageUrl={avatarUrl} size={72} ring />
          <div
            style={{
              position: "absolute", bottom: -2, right: -2, width: 26, height: 26, borderRadius: "50%",
              background: C.violet, display: "flex", alignItems: "center", justifyContent: "center",
              border: `2px solid ${C.bg}`, cursor: "pointer",
            }}
          >
            <Camera size={13} color="#fff" />
          </div>
        </div>
        <div>
          <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 19, color: C.text }}>{currentUser}</div>
          <div style={{ color: C.muted, fontSize: 12.5, marginTop: 2 }}>Bjsenjer member</div>
          <button
            onClick={pickFile}
            disabled={uploading}
            style={{ background: "none", border: "none", color: C.mint, fontSize: 12.5, fontWeight: 600, cursor: "pointer", padding: 0, marginTop: 6 }}
          >
            {uploading ? "Uploading..." : "Edit profile picture"}
          </button>
        </div>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
      </div>

      {error && <div style={{ color: C.coral, fontSize: 12, marginBottom: 12 }}>{error}</div>}

      {avatarUrl && (
        <button
          onClick={() => onAvatarChange(null)}
          style={{ background: "none", border: `1px solid ${C.line}`, color: C.muted, fontSize: 12, borderRadius: 8, padding: "6px 10px", cursor: "pointer", marginBottom: 16 }}
        >
          Remove photo
        </button>
      )}

      <div style={{ display: "flex", gap: 24, padding: "14px 0", borderTop: `1px solid ${C.line}`, borderBottom: `1px solid ${C.line}`, marginBottom: 20 }}>
        {[["Posts", ownPosts.length], ["Followers", 12], ["Following", 34]].map(([label, val]) => (
          <div key={label}>
            <div style={{ color: C.text, fontWeight: 700, fontSize: 16 }}>{val}</div>
            <div style={{ color: C.muted, fontSize: 11.5 }}>{label}</div>

      <button onClick={onLogout} style={{ ...primaryBtn, background: C.panel2, border: `1px solid ${C.line}`, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>

function ReelItem({ post, avatarUrl, onLike, onComment, onOpenProfile, onDelete, isOwn }) {
  const videoRef = useRef(null);
  const [videoFailed, setVideoFailed] = useState(false);
  const [showComments, setShowComments] = useState(false);
  const [draft, setDraft] = useState("");

  useEffect(() => {
    if (!post.video || !videoRef.current || typeof IntersectionObserver === "undefined") return;
    const el = videoRef.current;
    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) el.play().catch(() => {});
          else el.pause();
        });
      },
      { threshold: 0.6 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [post.video]);

  const submitComment = () => {
    if (!draft.trim()) return;
    onComment(post.id, draft.trim());
    setDraft("");
  };

  const confirmDelete = () => {
    if (window.confirm("Delete this post? This can't be undone.")) onDelete(post.id);
  };

  return (
    <div style={{ height: "100%", width: "100%", scrollSnapAlign: "start", scrollSnapStop: "always", position: "relative", background: "#000", overflow: "hidden" }}>
      {post.video && !videoFailed ? (
        <video
          ref={videoRef}
          src={post.video}
          loop
          muted
          playsInline
          controls={false}
          onError={() => setVideoFailed(true)}
          style={{ width: "100%", height: "100%", objectFit: "cover" }}
        />
      ) : post.image ? (
        <img src={post.image} alt={post.caption} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
      ) : (
        <div style={{ width: "100%", height: "100%", background: post.gradient }} />
      )}

      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.7), transparent 45%)", pointerEvents: "none" }} />

      <div style={{ position: "absolute", right: 10, bottom: 100, display: "flex", flexDirection: "column", alignItems: "center", gap: 22 }}>
        <button onClick={() => onOpenProfile && onOpenProfile(post.user)} style={iconBtn}>
          <Avatar name={post.user.name} color={post.user.color} imageUrl={avatarUrl} size={44} ring />
        </button>
        <button onClick={() => onLike(post.id)} style={{ ...iconBtn, flexDirection: "column", alignItems: "center", gap: 3 }}>
          <Heart size={28} color={post.likedByMe ? C.coral : "#fff"} fill={post.likedByMe ? C.coral : "none"} />
          <span style={{ color: "#fff", fontSize: 11, fontWeight: 700 }}>{post.likes}</span>
        </button>
        <button onClick={() => setShowComments(true)} style={{ ...iconBtn, flexDirection: "column", alignItems: "center", gap: 3 }}>
          <MessageSquare size={26} color="#fff" />
          <span style={{ color: "#fff", fontSize: 11, fontWeight: 700 }}>{post.comments.length}</span>
        </button>
        {isOwn && (
          <button onClick={confirmDelete} style={iconBtn}>
            <Trash size={24} color="#fff" />
          </button>
        )}
      </div>

      <div style={{ position: "absolute", left: 14, right: 74, bottom: 26, color: "#fff" }}>
        <div onClick={() => onOpenProfile && onOpenProfile(post.user)} style={{ fontWeight: 700, fontSize: 14.5, marginBottom: 5, cursor: "pointer" }}>
          @{post.user.name}
        </div>
        {post.caption && <div style={{ fontSize: 13, lineHeight: 1.4 }}>{post.caption}</div>}
      </div>

      {showComments && (
        <div
          onClick={() => setShowComments(false)}
          style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "flex-end", zIndex: 10 }}
        >
          <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxHeight: "65%", background: C.panel, borderTopLeftRadius: 16, borderTopRightRadius: 16, padding: 16, display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontWeight: 700, color: C.text, fontSize: 15 }}>Comments</span>
              <button onClick={() => setShowComments(false)} style={iconBtn}><X size={18} color={C.muted} /></button>
            </div>
            <div style={{ overflowY: "auto", flex: 1, marginBottom: 10 }}>
              {post.comments.length === 0 && <div style={{ color: C.muted, fontSize: 12.5 }}>No comments yet — say something.</div>}
              {post.comments.map((c, i) => (
                <div key={i} style={{ fontSize: 13, color: C.text, marginBottom: 8 }}>
                  <span style={{ fontWeight: 700 }}>{c.user}</span> {c.text}
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) submitComment(); }} placeholder="Add a comment..." style={{ ...inputStyle, flex: 1 }} />

            </div>

// ---------------- SEARCH ----------------
function colorForName(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[hash % AVATAR_COLORS.length];
}

  const combined = [...realUsers, ...seedUsers];
  const results = q.trim() ? combined.filter((u) => u.name.toLowerCase().includes(q.toLowerCase())) : combined;

  return (
    <div style={{ padding: "16px 16px 90px" }}>
      <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search people..." style={{ ...inputStyle, marginBottom: 16 }} />
      {results.length === 0 && <div style={{ color: C.muted, fontSize: 13, textAlign: "center", marginTop: 24 }}>No one found.</div>}
      {results.map((u) => (
        <div
          key={u.id}
          onClick={() => onViewProfile(u)}
          style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 2px", cursor: "pointer" }}
        >
          <Avatar name={u.name} color={u.color} imageUrl={u.imageUrl} size={44} online={u.online} />
          <div style={{ flex: 1 }}>
            <div style={{ color: C.text, fontSize: 14, fontWeight: 600 }}>{u.name}</div>
            {u.real && <div style={{ color: C.mint, fontSize: 11 }}>Bjsenjer member</div>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ---------------- CREATE ----------------
const MAX_VIDEO_BYTES = 4 * 1024 * 1024; // 4MB - localStorage has a small total quota (usually 5-10MB)

function CreateScreen({ onPost }) {
  const [caption, setCaption] = useState("");
  const [gradient] = useState(GRADIENTS[Math.floor(Math.random() * GRADIENTS.length)]);
  const [mediaType, setMediaType] = useState(null); // "image" | "video" | null
  const [mediaUrl, setMediaUrl] = useState(null);
  const [error, setError] = useState("");
  const [processing, setProcessing] = useState(false);
  const fileRef = useRef(null);

  const pickFile = () => fileRef.current && fileRef.current.click();

  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setError("");

    if (file.type.startsWith("image/")) {
      setProcessing(true);
      const reader = new FileReader();
      reader.onload = () => {
        const img = new window.Image();
        img.onload = () => {
          const maxDim = 1080;
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          setMediaUrl(canvas.toDataURL("image/jpeg", 0.82));
          setMediaType("image");
          setProcessing(false);
        };
        img.onerror = () => { setError("Couldn't read that image."); setProcessing(false); };
        img.src = reader.result;
      };
      reader.onerror = () => { setError("Couldn't read that file."); setProcessing(false); };
      reader.readAsDataURL(file);
    } else if (file.type.startsWith("video/")) {
      if (file.size > MAX_VIDEO_BYTES) {
        setError(`That video is too big (${(file.size / (1024 * 1024)).toFixed(1)}MB). This app stores everything in your browser's local storage, which has a small quota, so videos are capped at 4MB — try a shorter clip.`);
        return;
      }
      setProcessing(true);
      const reader = new FileReader();
      reader.onload = () => {
        setMediaUrl(reader.result);
        setMediaType("video");
        setProcessing(false);
      };
      reader.onerror = () => { setError("Couldn't read that file."); setProcessing(false); };
      reader.readAsDataURL(file);
    } else {
      setError("Please choose an image or video file.");
    }
  };

  const clearMedia = () => { setMediaUrl(null); setMediaType(null); };

  const submit = () => {
    if (!caption.trim() && !mediaUrl) return;
    onPost({
      caption: caption.trim(),
      image: mediaType === "image" ? mediaUrl : null,
      video: mediaType === "video" ? mediaUrl : null,
      gradient,
    });
    setCaption("");
    clearMedia();
  };

  return (
    <div style={{ padding: "16px 16px 90px" }}>
      <div
        onClick={!mediaUrl ? pickFile : undefined}
        style={{ height: 260, borderRadius: 16, overflow: "hidden", marginBottom: 12, position: "relative", cursor: !mediaUrl ? "pointer" : "default", background: mediaUrl ? "#000" : gradient, display: "flex", alignItems: "center", justifyContent: "center" }}
      >
        {processing ? (
          <span style={{ color: "#fff", fontSize: 13, fontFamily: "'Space Grotesk', sans-serif" }}>Processing...</span>
        ) : mediaType === "image" ? (
          <img src={mediaUrl} alt="Your upload" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        ) : mediaType === "video" ? (
          <video src={mediaUrl} controls loop muted playsInline style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        ) : (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
            <ImageIcon size={30} color="rgba(255,255,255,0.85)" />
            <span style={{ color: "rgba(255,255,255,0.85)", fontSize: 12.5, fontFamily: "'Space Grotesk', sans-serif" }}>Tap to add a photo or video</span>
          </div>
        )}
        {mediaUrl && (
          <button
            onClick={(e) => { e.stopPropagation(); clearMedia(); }}
            style={{ position: "absolute", top: 10, right: 10, width: 28, height: 28, borderRadius: "50%", background: "rgba(0,0,0,0.55)", border: "none", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}
          >
            <X size={14} color="#fff" />
          </button>
        )}
      </div>
      <input ref={fileRef} type="file" accept="image/*,video/*" onChange={handleFile} style={{ display: "none" }} />

      {!mediaUrl && (
        <button type="button" onClick={pickFile} style={{ ...primaryBtn, marginTop: 0, marginBottom: 14, background: C.panel2, border: `1px solid ${C.line}` }}>
          Choose photo or video
        </button>
      )}

      {error && (
        <p style={{ color: C.coral, fontSize: 12.5, marginBottom: 12, background: "#FF6F6120", padding: "8px 10px", borderRadius: 8 }}>{error}</p>
      )}

      <textarea value={caption} onChange={(e) => setCaption(e.target.value)} placeholder="Write a caption..." rows={4} style={{ ...inputStyle, resize: "none", marginBottom: 14 }} />
      <button onClick={submit} style={primaryBtn}>
        Share to feed
      </button>
    </div>
  );
}

// ---------------- APP ROOT ----------------
const STORAGE_KEYS = { accounts: "bjsenjer:accounts", session: "bjsenjer:session", posts: "bjsenjer:posts", avatars: "bjsenjer:avatars", dms: "bjsenjer:dms" };
const convosKeyFor = (username) => `bjsenjer:convos:${username}`;
const dmIdFor = (a, b) => "dm:" + [a, b].sort().join("::");

function storageGet(key, fallback) {
  try {
    const raw = window.localStorage.getItem(key);
    return raw === null ? fallback : JSON.parse(raw);
  } catch (e) {
    return fallback;
  }
}
function storageSet(key, value) {
  try {
    window.localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    // storage unavailable or quota exceeded - app still works for this session
    return false;
  }
}

function Bjsenjer() {
  const [loading, setLoading] = useState(true);
  const [accounts, setAccounts] = useState({});
  const [currentUser, setCurrentUser] = useState(null);
  const [tab, setTab] = useState("feed");
  const [messagesOpen, setMessagesOpen] = useState(false);
  const [activeThread, setActiveThread] = useState(null);
  const [viewingProfile, setViewingProfile] = useState(null);
  const [posts, setPosts] = useState(seedPosts);
  const [personalConvos, setPersonalConvos] = useState([]);
  const [dms, setDms] = useState({});
  const [avatars, setAvatars] = useState({});
  const [deferredPrompt, setDeferredPrompt] = useState(null);

  useEffect(() => {
    const handler = (e) => {
      e.preventDefault();
      setDeferredPrompt(e);
    };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  const handleInstallClick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    setDeferredPrompt(null);
  };

  useEffect(() => {
    const accts = storageGet(STORAGE_KEYS.accounts, {});
    const session = storageGet(STORAGE_KEYS.session, null);
    const savedPosts = storageGet(STORAGE_KEYS.posts, seedPosts);
    const savedDms = storageGet(STORAGE_KEYS.dms, {});
    const savedAvatars = storageGet(STORAGE_KEYS.avatars, {});
    setAccounts(accts);
    setPosts(savedPosts);
    setDms(savedDms);
    setAvatars(savedAvatars);
    if (session && accts[session]) {
      setCurrentUser(session);
      setPersonalConvos(storageGet(convosKeyFor(session), seedConvos));
    }
    setLoading(false);
  }, []);

  const handleSignup = async (uname, pw) => {
    const next = { ...accounts, [uname]: pw };
    setAccounts(next);
    storageSet(STORAGE_KEYS.accounts, next);
    storageSet(STORAGE_KEYS.session, uname);
    setPersonalConvos(storageGet(convosKeyFor(uname), seedConvos));
    setCurrentUser(uname);
  };

  const handleLogin = async (uname) => {
    storageSet(STORAGE_KEYS.session, uname);
    setPersonalConvos(storageGet(convosKeyFor(uname), seedConvos));
    setCurrentUser(uname);
  };

  const handleLogout = async () => {
    storageSet(STORAGE_KEYS.session, null);
    setCurrentUser(null);
    setPersonalConvos([]);
    setTab("feed");
    setMessagesOpen(false);
    setActiveThread(null);
    setViewingProfile(null);
  };

  const handleOpenProfile = (user) => setViewingProfile(user);

  useEffect(() => {
    if (!activeThread) return;
    const isDm = activeThread.startsWith("dm:");
    const exists = isDm ? !!dms[activeThread] : personalConvos.some((c) => c.id === activeThread);
    if (!exists) setActiveThread(null);
  }, [activeThread, personalConvos, dms]);

  const handleAvatarChange = (dataUrlOrNull) => {
    setAvatars((prev) => {
      const next = { ...prev };
      if (dataUrlOrNull) next[currentUser] = dataUrlOrNull;
      else delete next[currentUser];
      storageSet(STORAGE_KEYS.avatars, next);
      return next;
    });
  };

  const toggleLike = (id) => {
    setPosts((prev) => {
      const next = prev.map((p) => (p.id === id ? { ...p, likedByMe: !p.likedByMe, likes: p.likes + (p.likedByMe ? -1 : 1) } : p));
      storageSet(STORAGE_KEYS.posts, next);
      return next;
    });
  };

  const addComment = (id, text) => {
    setPosts((prev) => {
      const next = prev.map((p) => (p.id === id ? { ...p, comments: [...p.comments, { user: currentUser, text }] } : p));
      storageSet(STORAGE_KEYS.posts, next);
      return next;
    });
  };

  const handleDeletePost = (id) => {
    setPosts((prev) => {
      const next = prev.filter((p) => p.id !== id);
      storageSet(STORAGE_KEYS.posts, next);
      return next;
    });
  };

  const handlePost = ({ caption, image, video, gradient }) => {
    const newPost = { id: "p" + Date.now(), user: { name: currentUser, color: C.violet }, caption, image, video, gradient, likes: 0, likedByMe: false, comments: [] };
    setPosts((prev) => {
      const next = [newPost, ...prev];
      const saved = storageSet(STORAGE_KEYS.posts, next);
      if (!saved) {
        window.alert("Your post was shared, but it's too large to save permanently in this browser's storage (there's a small quota). It'll disappear if you reload the page. Try a smaller video/photo next time.");
      }
      return next;
    });
    setTab("feed");
  };

  const handleStartChat = (user) => {
    setViewingProfile(null);
    const isRealAccount = !!accounts[user.name];
    if (isRealAccount) {
      const id = dmIdFor(currentUser, user.name);
      setDms((prev) => {
        if (prev[id]) {
          setActiveThread(id);
          return prev;
        }
        const next = { ...prev, [id]: { id, participants: [currentUser, user.name], messages: [] } };
        storageSet(STORAGE_KEYS.dms, next);
        setActiveThread(id);
        return next;
      });
    } else {
      setPersonalConvos((prev) => {
        const existing = prev.find((c) => c.user.name === user.name);
        if (existing) {
          setActiveThread(existing.id);
          return prev;
        }
        const id = "chat-" + user.name;
        const next = [...prev, { id, user, messages: [], lastActivity: Date.now() }];
        storageSet(convosKeyFor(currentUser), next);
        setActiveThread(id);
        return next;
      });
    }
  };

  const handleSend = (convoId, text) => {
    if (convoId.startsWith("dm:")) {
      setDms((prev) => {
        const convo = prev[convoId];
        if (!convo) return prev;
        const msg = { id: Date.now() + "-" + Math.random().toString(36).slice(2), sender: currentUser, text, ts: Date.now() };
        const next = { ...prev, [convoId]: { ...convo, messages: [...convo.messages, msg] } };
        storageSet(STORAGE_KEYS.dms, next);
        return next;
      });
    } else {
      setPersonalConvos((prev) => {
        const next = prev.map((c) =>
          c.id === convoId
            ? { ...c, messages: [...c.messages, { id: Date.now() + "-" + Math.random().toString(36).slice(2), from: "me", text }], lastActivity: Date.now() }
            : c
        );
        storageSet(convosKeyFor(currentUser), next);
        return next;
      });
    }
  };

  // Combine the account's private demo-contact chats with any real shared DMs it's part of
  const dmList = Object.values(dms)
    .filter((d) => d.participants.includes(currentUser))
    .map((d) => {
      const otherName = d.participants.find((n) => n !== currentUser) || d.participants[0];
      const last = d.messages[d.messages.length - 1];
      return {
        id: d.id,
        user: { name: otherName, color: colorForName(otherName), imageUrl: avatars[otherName], online: true, real: true },
        messages: d.messages.map((m) => ({ id: m.id, from: m.sender === currentUser ? "me" : "them", text: m.text })),
        lastActivity: last ? last.ts : 0,
      };
    });
  const messagesList = [...personalConvos, ...dmList];
  const activeConvo = messagesList.find((c) => c.id === activeThread) || null;

  const isDesktop = useIsDesktop();

  return (
    <div style={{ width: "100%", height: "100vh", background: C.bg, display: "flex", justifyContent: "center" }}>
      {loading ? (
        <div style={{ width: "100%", maxWidth: 420, height: "100%", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Logo size={26} />
        </div>
      ) : !currentUser ? (
        <div style={{ width: "100%", height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}>
          <AuthScreen accounts={accounts} onSignup={handleSignup} onLogin={handleLogin} canInstallPrompt={!!deferredPrompt} onInstallClick={handleInstallClick} />
        </div>
      ) : activeThread ? (
        <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", fontFamily: "'Inter', sans-serif" }}>
          <ThreadScreen convo={activeConvo} onBack={() => setActiveThread(null)} onSend={handleSend} />
        </div>
      ) : viewingProfile ? (
        <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}>
          <UserProfileScreen
            user={viewingProfile}
            posts={posts}
            avatars={avatars}
            currentUser={currentUser}
            onBack={() => setViewingProfile(null)}
            onMessage={handleStartChat}
            toggleLike={toggleLike}
            addComment={addComment}
            onOpenProfile={handleOpenProfile}
            onDeletePost={handleDeletePost}
          />
        </div>
      ) : messagesOpen ? (
        <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}>
          <MessagesScreen convos={messagesList} onOpenThread={(id) => setActiveThread(id)} onBack={() => setMessagesOpen(false)} />
        </div>
      ) : (
        <div style={{ width: "100%", maxWidth: isDesktop ? 1040 : 420, height: "100%", display: "flex", fontFamily: "'Inter', sans-serif" }}>
          {isDesktop && <SideNav tab={tab} setTab={setTab} currentUser={currentUser} avatarUrl={avatars[currentUser]} />}
          <div style={{ flex: 1, height: "100%", position: "relative", overflow: tab === "reels" ? "hidden" : "visible" }}>
            {tab === "reels" ? (
              <ReelsScreen posts={posts} avatars={avatars} toggleLike={toggleLike} addComment={addComment} onOpenProfile={handleOpenProfile} onDeletePost={handleDeletePost} currentUser={currentUser} />
            ) : (
              <div style={{ height: "100%", overflowY: "auto" }}>
                <div style={{ maxWidth: isDesktop ? 600 : "100%", margin: isDesktop ? "0 auto" : 0 }}>
                  {tab === "feed" && <FeedScreen posts={posts} avatars={avatars} toggleLike={toggleLike} addComment={addComment} onOpenMessages={() => setMessagesOpen(true)} onOpenProfile={handleOpenProfile} onDeletePost={handleDeletePost} currentUser={currentUser} youAvatar={avatars[currentUser]} />}
                  {tab === "search" && <SearchScreen accounts={accounts} currentUser={currentUser} avatars={avatars} onViewProfile={handleOpenProfile} />}
                  {tab === "create" && <CreateScreen onPost={handlePost} />}
                  {tab === "messages" && <MessagesScreen convos={messagesList} onOpenThread={(id) => setActiveThread(id)} onBack={() => setTab("feed")} />}
                  {tab === "profile" && <ProfileScreen currentUser={currentUser} avatarUrl={avatars[currentUser]} onAvatarChange={handleAvatarChange} onLogout={handleLogout} posts={posts} toggleLike={toggleLike} addComment={addComment} onDeletePost={handleDeletePost} />}
                </div>
              </div>
            )}
            {!isDesktop && <BottomNav tab={tab} setTab={setTab} />}
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Bjsenjer />);
</script>
