function detectIsDesktop() {
  if (typeof window === "undefined") return false;
  const wideEnough = window.innerWidth >= 900;
  const mobileUA = typeof navigator !== "undefined" && /Android|iPhone|iPad|iPod|Mobile|Windows Phone|BlackBerry|Opera Mini/i.test(navigator.userAgent || "");
  const coarsePointer = typeof window.matchMedia === "function" && window.matchMedia("(pointer: coarse)").matches;
  return wideEnough && !mobileUA && !coarsePointer;
}

function useIsDesktop() {
  const [isDesktop, setIsDesktop] = useState(detectIsDesktop);
  useEffect(() => {
    const onResize = () => setIsDesktop(detectIsDesktop());
    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", onResize);
    return () => {
      window.removeEventListener("resize", onResize);
      window.removeEventListener("orientationchange", onResize);
    };
  }, []);
  return isDesktop;
}

function useViewportHeight() {
  const getHeight = () => (typeof window !== "undefined" ? (window.visualViewport ? window.visualViewport.height : window.innerHeight) : 800);
  const [height, setHeight] = useState(getHeight);
  useEffect(() => {
    const update = () => setHeight(getHeight());
    update();
    window.addEventListener("resize", update);
    window.addEventListener("orientationchange", update);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", update);
    return () => {
      window.removeEventListener("resize", update);
      window.removeEventListener("orientationchange", update);
      if (window.visualViewport) window.visualViewport.removeEventListener("resize", update);
    };
  }, []);
  return height;
}

  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [showInstructions, setShowInstructions] = useState(false);

  const isIOS = typeof navigator !== "undefined" && /iPad|iPhone|iPod/.test(navigator.userAgent);

  const handleInstall = () => {
    if (canInstallPrompt) onInstallClick();
    else setShowInstructions(true);
  };

  const submit = async (e) => {
    if (e && e.preventDefault) e.preventDefault();
    const uname = username.trim();
    const pw = password.trim();
    if (!uname || !pw) {
      setError("Fill in both fields to continue.");
      return;
    }
    setError("");
    setBusy(true);
    try {
      if (mode === "signup") {
        if (accounts[uname]) {
          setError("That username is taken. Try logging in instead.");
          setBusy(false);
          return;
        }
        await onSignup(uname, pw);
      } else {
        if (!accounts[uname]) {
          setError("No account with that username yet. Sign up first.");
          setBusy(false);
          return;
        }
        if (accounts[uname] !== pw) {
          setError("Wrong password. Try again.");
          setBusy(false);
          return;
        }
        await onLogin(uname);
      }
    } catch (err) {
      setError("Error: " + (err && err.message ? err.message : String(err)));
    }
    setBusy(false);
  };

  return (
    <div style={{ minHeight: "100%", background: `radial-gradient(circle at 20% 0%, ${C.violetSoft}33, transparent 60%), ${C.bg}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: "'Inter', sans-serif" }}>
      <div style={{ marginBottom: 20 }}>
        <Logo size={30} />
      </div>

      <button
        type="button"
        onClick={handleInstall}
        style={{
          display: "flex", alignItems: "center", gap: 7, background: C.panel2,
          border: `1px solid ${C.line}`, borderRadius: 20, padding: "7px 14px",
          color: C.text, fontSize: 12.5, fontWeight: 600, cursor: "pointer", marginBottom: 24,
        }}
      >
        <Download size={14} color={C.mint} />
        Install app
      </button>

      {showInstructions && (
        <div
          onClick={() => setShowInstructions(false)}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 20, padding: 24 }}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{ width: "100%", maxWidth: 320, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: 20 }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, color: C.text, fontSize: 15 }}>Add to Home Screen</span>
              <button onClick={() => setShowInstructions(false)} style={iconBtn}><X size={18} color={C.muted} /></button>
            </div>
            {isIOS ? (
              <p style={{ color: C.muted, fontSize: 13, lineHeight: 1.6, margin: 0 }}>
                Tap the <Share size={13} style={{ display: "inline-flex" }} color={C.text} /> Share button in Safari, then choose <strong style={{ color: C.text }}>"Add to Home Screen."</strong>
              </p>
            ) : (
              <p style={{ color: C.muted, fontSize: 13, lineHeight: 1.6, margin: 0 }}>
                Open your browser menu (⋮) and choose <strong style={{ color: C.text }}>"Add to Home screen"</strong> or <strong style={{ color: C.text }}>"Install app."</strong> If you don't see that option, your browser may not support installing this page directly.
              </p>
            )}
          </div>
        </div>
      )}

      <div style={{ width: "100%", maxWidth: 340, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 18, padding: 24 }}>
        <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 19, margin: "0 0 4px", color: C.text }}>
          {mode === "login" ? "Welcome back" : "Create your account"}
        </h1>
        <p style={{ color: C.muted, fontSize: 13, margin: "0 0 20px" }}>
          {mode === "login" ? "Log in to see your feed and messages." : "Pick a username and password to join."}
        </p>

        <label style={{ fontSize: 12, color: C.muted, display: "block", marginBottom: 6 }}>Username</label>
        <input value={username} onChange={(e) => setUsername(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)} placeholder="yourname" style={inputStyle} autoComplete="username" />

        <label style={{ fontSize: 12, color: C.muted, display: "block", margin: "14px 0 6px" }}>Password</label>
        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)} placeholder="••••••••" style={inputStyle} autoComplete={mode === "login" ? "current-password" : "new-password"} />

        {error && (
          <p style={{ color: C.coral, fontSize: 12.5, marginTop: 12, background: "#FF6F6120", padding: "8px 10px", borderRadius: 8 }}>
            {error}
          </p>
        )}

        <button type="button" onClick={submit} disabled={busy} style={{ ...primaryBtn, opacity: busy ? 0.6 : 1 }}>
          {busy ? "Please wait..." : mode === "login" ? "Log in" : "Create account"}
        </button>

        <p style={{ textAlign: "center", fontSize: 13, color: C.muted, marginTop: 18 }}>
          {mode === "login" ? "New here?" : "Already have an account?"}{" "}
          <span
            onClick={() => { setMode(mode === "login" ? "signup" : "login"); setError(""); }}
            style={{ color: C.mint, cursor: "pointer", fontWeight: 600 }}
          >
            {mode === "login" ? "Create one" : "Log in instead"}
          </span>
        </p>
      </div>
    </div>
  );
}

// ---------------- POST CARD ----------------
function PostCard({ post, avatarUrl, currentUser, onLike, onComment, onDeleteComment, onOpenProfile, onDelete, isOwn, onToggleBookmark, isBookmarked }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const likedByMe = post.likedBy ? post.likedBy.includes(currentUser) : false;
  const likeCount = (post.baseLikes || 0) + (post.likedBy ? post.likedBy.length : 0);
  const [draft, setDraft] = useState("");
  const [showComments, setShowComments] = useState(false);
  const [videoFailed, setVideoFailed] = useState(false);
  const [videoLoaded, setVideoLoaded] = useState(false);
  const [showMenu, setShowMenu] = useState(false);
  const menuRef = useRef(null);

  useEffect(() => {
    if (!post.video) return;
    const t = setTimeout(() => {
      setVideoLoaded((loaded) => {
        if (!loaded) setVideoFailed(true);
        return loaded;
      });
    }, 2500);
    return () => clearTimeout(t);
  }, [post.video]);

  useEffect(() => {
    if (!showMenu) return;
    const onDocClick = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) setShowMenu(false);
    };
    document.addEventListener("mousedown", onDocClick);
    return () => document.removeEventListener("mousedown", onDocClick);
  }, [showMenu]);

  const submitComment = () => {
    if (!draft.trim()) return;
    onComment(post.id, draft.trim());
    setDraft("");
  };

  const confirmDelete = () => {
    setShowMenu(false);
    if (window.confirm("Delete this post? This can't be undone.")) onDelete(post.id);
  };

  const [showBigHeart, setShowBigHeart] = useState(false);
  const handleDoubleTap = () => {
    if (!likedByMe) onLike(post.id);
    setShowBigHeart(true);
    setTimeout(() => setShowBigHeart(false), 700);
  };

  const showVideo = post.video && !videoFailed;

  return (
    <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, marginBottom: 18, overflow: "hidden", boxShadow: "0 4px 18px rgba(0,0,0,0.28)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px" }}>
        <div
          style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, cursor: onOpenProfile ? "pointer" : "default" }}
          onClick={() => onOpenProfile && onOpenProfile(post.user)}
        >
          <Avatar name={post.user.name} color={post.user.color} imageUrl={avatarUrl} size={36} ring />
          <div style={{ flex: 1 }}>
            <div style={{ color: C.text, fontWeight: 600, fontSize: 13.5 }}>{post.user.name}</div>
            <div style={{ color: C.muted, fontSize: 11 }}>
              {timeAgo(post.createdAt)}{post.createdAt ? " · " : ""}{showVideo ? "Video post" : post.image ? "Photo post" : "Original post"}
            </div>
          </div>
        </div>
        <div ref={menuRef} style={{ position: "relative" }}>
          <button onClick={() => setShowMenu((s) => !s)} style={iconBtn}>
            <MoreHorizontal size={18} color={C.muted} />
          </button>
          {showMenu && (
            <div style={{ position: "absolute", top: 24, right: 0, background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, overflow: "hidden", zIndex: 5, minWidth: 130 }}>
              {isOwn ? (
                <button onClick={confirmDelete} style={{ display: "block", width: "100%", padding: "10px 14px", background: "none", border: "none", color: C.coral, fontSize: 13, cursor: "pointer", textAlign: "left", whiteSpace: "nowrap" }}>
                  Delete post
                </button>
              ) : (
                <div style={{ padding: "10px 14px", color: C.muted, fontSize: 12.5, whiteSpace: "nowrap" }}>Nothing here yet</div>
              )}
            </div>
          )}
        </div>
      </div>

      <div onDoubleClick={handleDoubleTap} style={{ position: "relative", width: "100%", aspectRatio: "4 / 5", background: "#000", overflow: "hidden" }}>
        {showVideo ? (
          <video
            key={post.video}
            src={post.video}
            poster={post.image || undefined}
            controls
            loop
            muted
            playsInline
            preload="auto"
            onLoadedData={() => setVideoLoaded(true)}
            onCanPlay={() => setVideoLoaded(true)}
            onError={() => setVideoFailed(true)}
            onStalled={() => setVideoFailed(true)}
            style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
          />
        ) : post.image ? (
          <img
            src={post.image}
            alt={post.caption}
            loading="lazy"
            style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
          />
        ) : (
          <div style={{ height: "100%", background: post.gradient, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: "rgba(255,255,255,0.85)", fontSize: 13, letterSpacing: "0.08em", textTransform: "uppercase" }}>
              placeholder image
            </span>
          </div>
        )}
        {showBigHeart && (
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
            <Heart size={84} color="#fff" fill="#fff" style={{ filter: "drop-shadow(0 4px 14px rgba(0,0,0,0.5))" }} />
          </div>
        )}
      </div>
      {post.credit && (
        <div style={{ padding: "6px 14px 0", color: C.muted, fontSize: 10.5 }}>{post.credit}</div>
      )}

      <div style={{ padding: "12px 14px" }}>
        <div style={{ display: "flex", gap: 16, marginBottom: 10 }}>
          <button onClick={() => onLike(post.id)} style={iconBtn}>
            <Heart size={22} color={likedByMe ? C.coral : C.text} fill={likedByMe ? C.coral : "none"} />
          </button>
          <button onClick={() => setShowComments((s) => !s)} style={iconBtn}>
            <MessageSquare size={22} color={C.text} />
          </button>
          <Send size={20} color={C.text} style={{ marginTop: 1 }} />
          <div style={{ flex: 1 }} />
          <button onClick={() => onToggleBookmark && onToggleBookmark(post.id)} style={iconBtn}>
            <Bookmark size={20} color={isBookmarked ? C.violet : C.text} fill={isBookmarked ? C.violet : "none"} />
          </button>
        </div>

        <div style={{ color: C.text, fontSize: 13.5, fontWeight: 700, marginBottom: 4 }}>{likeCount} likes</div>
        <div style={{ color: C.text, fontSize: 13.5, marginBottom: showComments ? 10 : 0 }}>
          <span style={{ fontWeight: 700 }}>{post.user.name}</span> {post.caption}
        </div>

        {showComments && (
          <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 10 }}>
            {post.comments.length === 0 && <div style={{ color: C.muted, fontSize: 12.5, marginBottom: 8 }}>No comments yet — say something.</div>}
            {post.comments.map((c, i) => (
              <div key={c.id || i} style={{ fontSize: 13, color: C.text, marginBottom: 6, display: "flex", alignItems: "flex-start", gap: 6 }}>
                <div style={{ flex: 1 }}><span style={{ fontWeight: 700 }}>{c.user}</span> {c.text}</div>
                {c.user === currentUser && onDeleteComment && (
                  <button onClick={() => onDeleteComment(post.id, c.id != null ? c.id : i)} style={{ ...iconBtn, flexShrink: 0 }}>
                    <X size={12} color={C.muted} />
                  </button>
                )}
              </div>
            ))}
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) submitComment(); }} placeholder="Add a comment..." style={{ ...inputStyle, flex: 1, padding: "8px 10px", fontSize: 12.5 }} />
              <button onClick={submitComment} style={{ ...primaryBtn, width: "auto", marginTop: 0, padding: "0 14px", fontSize: 12.5 }}>Post</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------------- CHAT THREAD ----------------
function ThreadScreen({ convo, onBack, onSend }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const [draft, setDraft] = useState("");
  const endRef = useRef(null);

  useEffect(() => {
    if (endRef.current) endRef.current.scrollIntoView({ block: "end" });
  }, [convo && convo.messages.length]);

  if (!convo) {
    return (
      <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, padding: 24 }}>
        <span style={{ color: C.muted, fontSize: 13 }}>This conversation couldn't be found.</span>
        <button onClick={onBack} style={{ ...primaryBtn, width: "auto", padding: "10px 20px" }}>Back to Messages</button>
      </div>
    );
  }

  const send = () => {
    if (!draft.trim()) return;
    onSend(convo.id, draft.trim());
    setDraft("");
  };

  let lastMineIdx = -1;
  convo.messages.forEach((m, i) => { if (m.from === "me") lastMineIdx = i; });

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", borderBottom: `1px solid ${C.line}` }}>
        <button onClick={onBack} style={iconBtn}><ArrowLeft size={22} color={C.text} /></button>
        <Avatar name={convo.user.name} color={convo.user.color} size={36} online={convo.user.online} />
        <div>
          <div style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>{convo.user.name}</div>
          <div style={{ color: convo.user.online ? C.mint : C.muted, fontSize: 11 }}>{convo.user.online ? "Active now" : "Offline"}</div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "14px 14px 6px", display: "flex", flexDirection: "column", gap: 8 }}>
        {convo.messages.map((m, i) => (
          <div key={m.id || i} style={{ display: "flex", flexDirection: "column", alignItems: m.from === "me" ? "flex-end" : "flex-start" }}>
            <div style={{ maxWidth: "72%", padding: "9px 13px", borderRadius: 16, borderBottomRightRadius: m.from === "me" ? 4 : 16, borderBottomLeftRadius: m.from === "me" ? 16 : 4, background: m.from === "me" ? `linear-gradient(135deg,${C.violet},${C.coral})` : C.panel2, color: "#fff", fontSize: 13.5, lineHeight: 1.4 }}>
              {m.text}
            </div>
            {i === lastMineIdx && m.seen && (
              <span style={{ fontSize: 10.5, color: C.muted, marginTop: 3, marginRight: 2 }}>Seen</span>
            )}
          </div>
        ))}
        <div ref={endRef} />
      </div>

      <div style={{ display: "flex", gap: 8, padding: "10px 14px 18px", borderTop: `1px solid ${C.line}` }}>
        <input
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) send(); }}
          placeholder="Message..."
          style={{ ...inputStyle, flex: 1, borderRadius: 20, padding: "10px 14px" }}
        />
        <button onClick={send} style={{ ...iconBtn, background: C.violet, borderRadius: "50%", width: 38, height: 38, alignItems: "center", justifyContent: "center" }}>
          <Send size={17} color="#fff" />
        </button>
      </div>
    </div>
  );
}

// ---------------- PROFILE ----------------
function ProfileScreen({ currentUser, avatarUrl, onAvatarChange, onLogout, posts, toggleLike, addComment, onDeleteComment, onDeletePost, themeName, onThemeChange, bio, onBioChange, followerCount, followingCount, bookmarks, onToggleBookmark }) {
  const C = useContext(ThemeContext);
  const primaryBtn = primaryBtnFor(C);
  const inputStyle = inputStyleFor(C);
  const fileRef = useRef(null);
  const [uploading, setUploading] = useState(false);
  const [error, setError] = useState("");
  const [editingBio, setEditingBio] = useState(false);
  const [bioDraft, setBioDraft] = useState(bio || "");
  const [view, setView] = useState("posts");
  const ownPosts = posts.filter((p) => p.user.name === currentUser);
  const savedPosts = posts.filter((p) => bookmarks && bookmarks.includes(p.id));

  const pickFile = () => fileRef.current && fileRef.current.click();

  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    if (!file.type.startsWith("image/")) {
      setError("Please choose an image file.");
      return;
    }
    setError("");
    setUploading(true);
    const reader = new FileReader();
    reader.onload = () => {
      const img = new window.Image();
      img.onload = () => {
        const size = 300;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        const scale = Math.max(size / img.width, size / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        onAvatarChange(dataUrl);
        setUploading(false);
      };
      img.onerror = () => { setError("Couldn't read that image."); setUploading(false); };
      img.src = reader.result;
    };
    reader.onerror = () => { setError("Couldn't read that file."); setUploading(false); };
    reader.readAsDataURL(file);
  };

  const saveBio = () => {
    onBioChange(bioDraft.trim());
    setEditingBio(false);
  };

  return (
    <div style={{ padding: "20px 18px 90px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 12 }}>
        <div style={{ position: "relative" }} onClick={pickFile}>
          <Avatar name={currentUser} color={C.violet} imageUrl={avatarUrl} size={72} ring />
          <div
            style={{
              position: "absolute", bottom: -2, right: -2, width: 26, height: 26, borderRadius: "50%",
              background: C.violet, display: "flex", alignItems: "center", justifyContent: "center",

            }}

function ReelItem({ post, avatarUrl, currentUser, onLike, onComment, onOpenProfile, onDelete, isOwn, muted, onToggleMute }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const likedByMe = post.likedBy ? post.likedBy.includes(currentUser) : false;
  const likeCount = (post.baseLikes || 0) + (post.likedBy ? post.likedBy.length : 0);
  const videoRef = useRef(null);
  const [videoFailed, setVideoFailed] = useState(false);
  const [showComments, setShowComments] = useState(false);
  const [draft, setDraft] = useState("");

  useEffect(() => {
    if (!post.video || !videoRef.current || typeof IntersectionObserver === "undefined") return;
    const el = videoRef.current;
    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) el.play().catch(() => {});
          else el.pause();
        });
      },
      { threshold: 0.6 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [post.video]);

  // Keep the video element's actual muted property in sync with state - setting the
  // muted attribute via JSX alone can silently fail to take effect after the video
  // has already started playing, so we also set it directly on the element.
  useEffect(() => {
    if (videoRef.current) videoRef.current.muted = muted;
  }, [muted]);

  const submitComment = () => {
    if (!draft.trim()) return;
    onComment(post.id, draft.trim());
    setDraft("");
  };

  const confirmDelete = () => {
    if (window.confirm("Delete this post? This can't be undone.")) onDelete(post.id);
  };

  return (
    <div
      style={{ height: "100%", width: "100%", scrollSnapAlign: "start", scrollSnapStop: "always", position: "relative", background: "#000", overflow: "hidden" }}
      onClick={() => post.video && !videoFailed && onToggleMute()}
    >
      {post.video && !videoFailed ? (
        <video
          ref={videoRef}
          src={post.video}
          loop
          muted={muted}
          playsInline
          controls={false}
          onError={() => setVideoFailed(true)}
          style={{ width: "100%", height: "100%", objectFit: "cover" }}
        />
      ) : post.image ? (
        <img src={post.image} alt={post.caption} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
      ) : (
        <div style={{ width: "100%", height: "100%", background: post.gradient }} />
      )}

      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.7), transparent 45%)", pointerEvents: "none" }} />

      {post.video && !videoFailed && (
        <div
          style={{
            position: "absolute", top: 16, right: 16, width: 34, height: 34, borderRadius: "50%",
            background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center",
          }}
        >
          {muted ? <VolumeX size={16} color="#fff" /> : <Volume2 size={16} color="#fff" />}
        </div>
      )}

      <div style={{ position: "absolute", right: 10, bottom: 100, display: "flex", flexDirection: "column", alignItems: "center", gap: 22 }}>
        <button onClick={(e) => { e.stopPropagation(); onOpenProfile && onOpenProfile(post.user); }} style={iconBtn}>
          <Avatar name={post.user.name} color={post.user.color} imageUrl={avatarUrl} size={44} ring />
        </button>
        <button onClick={(e) => { e.stopPropagation(); onLike(post.id); }} style={{ ...iconBtn, flexDirection: "column", alignItems: "center", gap: 3 }}>
          <Heart size={28} color={likedByMe ? C.coral : "#fff"} fill={likedByMe ? C.coral : "none"} />
          <span style={{ color: "#fff", fontSize: 11, fontWeight: 700 }}>{likeCount}</span>
        </button>
        <button onClick={(e) => { e.stopPropagation(); setShowComments(true); }} style={{ ...iconBtn, flexDirection: "column", alignItems: "center", gap: 3 }}>
          <MessageSquare size={26} color="#fff" />
          <span style={{ color: "#fff", fontSize: 11, fontWeight: 700 }}>{post.comments.length}</span>
        </button>
        {isOwn && (
          <button onClick={(e) => { e.stopPropagation(); confirmDelete(); }} style={iconBtn}>
            <Trash size={24} color="#fff" />
          </button>
        )}
      </div>

      <div style={{ position: "absolute", left: 14, right: 74, bottom: 26, color: "#fff" }}>
        <div onClick={(e) => { e.stopPropagation(); onOpenProfile && onOpenProfile(post.user); }} style={{ fontWeight: 700, fontSize: 14.5, marginBottom: 5, cursor: "pointer" }}>
          @{post.user.name}
        </div>
        {post.caption && <div style={{ fontSize: 13, lineHeight: 1.4 }}>{post.caption}</div>}
      </div>

      {showComments && (
        <div
          onClick={(e) => { e.stopPropagation(); setShowComments(false); }}
          style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "flex-end", zIndex: 10 }}
        >
          <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxHeight: "65%", background: C.panel, borderTopLeftRadius: 16, borderTopRightRadius: 16, padding: 16, display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontWeight: 700, color: C.text, fontSize: 15 }}>Comments</span>
              <button onClick={() => setShowComments(false)} style={iconBtn}><X size={18} color={C.muted} /></button>
            </div>
            <div style={{ overflowY: "auto", flex: 1, marginBottom: 10 }}>
              {post.comments.length === 0 && <div style={{ color: C.muted, fontSize: 12.5 }}>No comments yet — say something.</div>}
              {post.comments.map((c, i) => (
                <div key={i} style={{ fontSize: 13, color: C.text, marginBottom: 8 }}>
                  <span style={{ fontWeight: 700 }}>{c.user}</span> {c.text}
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) submitComment(); }} placeholder="Add a comment..." style={{ ...inputStyle, flex: 1 }} />
              <button onClick={submitComment} style={{ ...primaryBtn, width: "auto", marginTop: 0, padding: "0 14px" }}>Post</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ---------------- SEARCH ----------------
function timeAgo(ts) {
  if (!ts) return "";
  const diff = Math.max(0, Date.now() - ts);
  const min = Math.floor(diff / 60000);
  if (min < 1) return "Just now";
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day < 7) return `${day}d ago`;
  const wk = Math.floor(day / 7);
  return `${wk}w ago`;
}

function colorForName(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[hash % AVATAR_COLORS.length];
}

  }, []);

  const realUsers = Object.keys(accounts || {})
    .filter((name) => name !== currentUser && !seedUsers.some((su) => su.name === name))
    .map((name) => ({ id: "acct-" + name, name, color: colorForName(name), online: true, imageUrl: avatars && avatars[name], real: true }));

  const combined = [...realUsers, ...seedUsers];
  const isSearching = q.trim().length > 0;
  const results = isSearching ? combined.filter((u) => u.name.toLowerCase().includes(q.toLowerCase())) : combined;
  const exploreTiles = [...posts].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  return (
    <div style={{ padding: "16px 16px 90px" }}>
      <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search people..." style={{ ...inputStyle, marginBottom: 16 }} />

      {isSearching ? (
        <>
          {results.length === 0 && <div style={{ color: C.muted, fontSize: 13, textAlign: "center", marginTop: 24 }}>No one found.</div>}
          {results.map((u) => (
            <div
              key={u.id}
              onClick={() => onViewProfile(u)}
              style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 2px", cursor: "pointer" }}
            >
              <Avatar name={u.name} color={u.color} imageUrl={u.imageUrl} size={44} online={u.online} />
              <div style={{ flex: 1 }}>
                <div style={{ color: C.text, fontSize: 14, fontWeight: 600 }}>{u.name}</div>
                {u.real && <div style={{ color: C.mint, fontSize: 11 }}>Bjsenjer member</div>}
              </div>
            </div>
          ))}
        </>
      ) : exploreTiles.length === 0 ? (
        <div style={{ color: C.muted, fontSize: 13, textAlign: "center", marginTop: 24 }}>Nothing to explore yet.</div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 3 }}>
          {exploreTiles.map((p) => (
            <div
              key={p.id}
              onClick={() => onViewProfile(p.user)}
              style={{ position: "relative", aspectRatio: "1 / 1", background: p.image ? "#000" : p.gradient || C.panel2, cursor: "pointer", overflow: "hidden" }}
            >
              {p.image ? (
                <img src={p.image} alt={p.caption} loading="lazy" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
              ) : (
                <div style={{ width: "100%", height: "100%" }} />
              )}
              {p.video && (
                <div style={{ position: "absolute", top: 6, right: 6 }}>
                  <Film size={14} color="#fff" />
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------------- CREATE ----------------
const MAX_VIDEO_BYTES = 4 * 1024 * 1024; // 4MB - localStorage has a small total quota (usually 5-10MB)

function CreateScreen({ onPost }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const [caption, setCaption] = useState("");
  const [gradient] = useState(GRADIENTS[Math.floor(Math.random() * GRADIENTS.length)]);
  const [mediaType, setMediaType] = useState(null); // "image" | "video" | null
  const [mediaUrl, setMediaUrl] = useState(null);
  const [error, setError] = useState("");
  const [processing, setProcessing] = useState(false);
  const fileRef = useRef(null);

  const pickFile = () => fileRef.current && fileRef.current.click();

  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setError("");

    if (file.type.startsWith("image/")) {
      setProcessing(true);
      const reader = new FileReader();
      reader.onload = () => {
        const img = new window.Image();
        img.onload = () => {
          const maxDim = 1080;
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          setMediaUrl(canvas.toDataURL("image/jpeg", 0.82));
          setMediaType("image");
          setProcessing(false);
        };
        img.onerror = () => { setError("Couldn't read that image."); setProcessing(false); };
        img.src = reader.result;
      };
      reader.onerror = () => { setError("Couldn't read that file."); setProcessing(false); };
      reader.readAsDataURL(file);
    } else if (file.type.startsWith("video/")) {
      if (file.size > MAX_VIDEO_BYTES) {
        setError(`That video is too big (${(file.size / (1024 * 1024)).toFixed(1)}MB). This app stores everything in your browser's local storage, which has a small quota, so videos are capped at 4MB — try a shorter clip.`);
        return;
      }
      setProcessing(true);
      const reader = new FileReader();
      reader.onload = () => {
        setMediaUrl(reader.result);
        setMediaType("video");
        setProcessing(false);
      };
      reader.onerror = () => { setError("Couldn't read that file."); setProcessing(false); };
      reader.readAsDataURL(file);
    } else {
      setError("Please choose an image or video file.");
    }
  };

  const clearMedia = () => { setMediaUrl(null); setMediaType(null); };

  const submit = () => {
    if (!caption.trim() && !mediaUrl) return;
    onPost({
      caption: caption.trim(),
      image: mediaType === "image" ? mediaUrl : null,
      video: mediaType === "video" ? mediaUrl : null,
      gradient,
    });
    setCaption("");
    clearMedia();
  };

  return (
    <div style={{ padding: "16px 16px 90px" }}>
      <div
        onClick={!mediaUrl ? pickFile : undefined}
        style={{ height: 260, borderRadius: 16, overflow: "hidden", marginBottom: 12, position: "relative", cursor: !mediaUrl ? "pointer" : "default", background: mediaUrl ? "#000" : gradient, display: "flex", alignItems: "center", justifyContent: "center" }}
      >
        {processing ? (
          <span style={{ color: "#fff", fontSize: 13, fontFamily: "'Space Grotesk', sans-serif" }}>Processing...</span>
        ) : mediaType === "image" ? (
          <img src={mediaUrl} alt="Your upload" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        ) : mediaType === "video" ? (
          <video src={mediaUrl} controls loop muted playsInline style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        ) : (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
            <ImageIcon size={30} color="rgba(255,255,255,0.85)" />
            <span style={{ color: "rgba(255,255,255,0.85)", fontSize: 12.5, fontFamily: "'Space Grotesk', sans-serif" }}>Tap to add a photo or video</span>
          </div>
        )}
        {mediaUrl && (
          <button
            onClick={(e) => { e.stopPropagation(); clearMedia(); }}
            style={{ position: "absolute", top: 10, right: 10, width: 28, height: 28, borderRadius: "50%", background: "rgba(0,0,0,0.55)", border: "none", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}
          >
            <X size={14} color="#fff" />
          </button>
        )}
      </div>
      <input ref={fileRef} type="file" accept="image/*,video/*" onChange={handleFile} style={{ display: "none" }} />

      {!mediaUrl && (
        <button type="button" onClick={pickFile} style={{ ...primaryBtn, marginTop: 0, marginBottom: 14, background: C.panel2, border: `1px solid ${C.line}` }}>
          Choose photo or video
        </button>
      )}

      {error && (
        <p style={{ color: C.coral, fontSize: 12.5, marginBottom: 12, background: "#FF6F6120", padding: "8px 10px", borderRadius: 8 }}>{error}</p>
      )}

      <textarea value={caption} onChange={(e) => setCaption(e.target.value)} placeholder="Write a caption..." rows={4} style={{ ...inputStyle, resize: "none", marginBottom: 14 }} />
      <button onClick={submit} style={primaryBtn}>
        Share to feed
      </button>
    </div>
  );
}

// ---------------- APP ROOT ----------------
const STORAGE_KEYS = { accounts: "bjsenjer:accounts", session: "bjsenjer:session", posts: "bjsenjer:posts", avatars: "bjsenjer:avatars", dms: "bjsenjer:dms", theme: "bjsenjer:theme", bios: "bjsenjer:bios", follows: "bjsenjer:follows" };
const convosKeyFor = (username) => `bjsenjer:convos:${username}`;
const lastSeenKeyFor = (username) => `bjsenjer:lastSeen:${username}`;
const bookmarksKeyFor = (username) => `bjsenjer:bookmarks:${username}`;
const lastSeenActivityCountKeyFor = (username) => `bjsenjer:lastSeenActivity:${username}`;
const dmIdFor = (a, b) => "dm:" + [a, b].sort().join("::");

function storageGet(key, fallback) {
  try {
    const raw = window.localStorage.getItem(key);
    return raw === null ? fallback : JSON.parse(raw);
  } catch (e) {
    return fallback;
  }
}
function storageSet(key, value) {
  try {
    window.localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    // storage unavailable or quota exceeded - app still works for this session
    return false;
  }
}

function Bjsenjer() {
  const [loading, setLoading] = useState(true);
  const [accounts, setAccounts] = useState({});
  const [currentUser, setCurrentUser] = useState(null);
  const [tab, setTab] = useState("feed");
  const [messagesOpen, setMessagesOpen] = useState(false);
  const [activeThread, setActiveThread] = useState(null);
  const [viewingProfile, setViewingProfile] = useState(null);
  const [posts, setPosts] = useState(seedPosts);
  const [personalConvos, setPersonalConvos] = useState([]);
  const [dms, setDms] = useState({});
  const [avatars, setAvatars] = useState({});
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [themeName, setThemeName] = useState("nightlife");
  const [lastSeenMessagesAt, setLastSeenMessagesAt] = useState(0);
  const [bookmarks, setBookmarks] = useState([]);
  const [bios, setBios] = useState({});
  const [follows, setFollows] = useState({});
  const [lastSeenActivityCount, setLastSeenActivityCount] = useState(0);

  useEffect(() => {
    const handler = (e) => {
      e.preventDefault();
      setDeferredPrompt(e);
    };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  const handleInstallClick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    setDeferredPrompt(null);
  };

  useEffect(() => {
    const accts = storageGet(STORAGE_KEYS.accounts, {});
    const session = storageGet(STORAGE_KEYS.session, null);
    const savedPosts = storageGet(STORAGE_KEYS.posts, seedPosts);
    const savedDms = storageGet(STORAGE_KEYS.dms, {});
    const savedAvatars = storageGet(STORAGE_KEYS.avatars, {});
    const savedTheme = storageGet(STORAGE_KEYS.theme, "nightlife");
    const savedBios = storageGet(STORAGE_KEYS.bios, {});
    const savedFollows = storageGet(STORAGE_KEYS.follows, {});
    setAccounts(accts);
    setPosts(savedPosts);
    setDms(savedDms);
    setAvatars(savedAvatars);
    setBios(savedBios);
    setFollows(savedFollows);
    if (THEMES[savedTheme]) setThemeName(savedTheme);
    if (session && accts[session]) {
      setCurrentUser(session);
      setPersonalConvos(storageGet(convosKeyFor(session), seedConvos));
      setLastSeenMessagesAt(storageGet(lastSeenKeyFor(session), 0));
      setBookmarks(storageGet(bookmarksKeyFor(session), []));
      setLastSeenActivityCount(storageGet(lastSeenActivityCountKeyFor(session), 0));
    }
    setLoading(false);
  }, []);

  const handleRefreshAccounts = () => setAccounts(storageGet(STORAGE_KEYS.accounts, {}));

  const markMessagesSeen = () => {
    const now = Date.now();
    setLastSeenMessagesAt(now);
    if (currentUser) storageSet(lastSeenKeyFor(currentUser), now);
  };

  const markActivitySeen = (count) => {
    setLastSeenActivityCount(count);
    if (currentUser) storageSet(lastSeenActivityCountKeyFor(currentUser), count);
  };

  const handleThemeChange = (key) => {
    if (!THEMES[key]) return;
    setThemeName(key);
    storageSet(STORAGE_KEYS.theme, key);
  };

  const handleBioChange = (text) => {
    setBios((prev) => {
      const next = { ...prev, [currentUser]: text };
      storageSet(STORAGE_KEYS.bios, next);
      return next;
    });
  };

  const handleToggleBookmark = (postId) => {
    setBookmarks((prev) => {
      const next = prev.includes(postId) ? prev.filter((id) => id !== postId) : [...prev, postId];
      if (currentUser) storageSet(bookmarksKeyFor(currentUser), next);
      return next;
    });
  };

  const handleToggleFollow = (targetName) => {
    setFollows((prev) => {
      const mine = prev[currentUser] || [];
      const nextMine = mine.includes(targetName) ? mine.filter((n) => n !== targetName) : [...mine, targetName];
      const next = { ...prev, [currentUser]: nextMine };
      storageSet(STORAGE_KEYS.follows, next);
      return next;
    });
  };

  // Keep data in sync across browser tabs of the same browser - without this, a new
  // account signed up in another tab (or a message sent there) never shows up here
  // until a manual reload, since each tab otherwise only reads storage once on mount.
  useEffect(() => {
    const onStorage = (e) => {
      if (!e.key) return;
      if (e.key === STORAGE_KEYS.accounts) setAccounts(storageGet(STORAGE_KEYS.accounts, {}));
      else if (e.key === STORAGE_KEYS.posts) setPosts(storageGet(STORAGE_KEYS.posts, seedPosts));
      else if (e.key === STORAGE_KEYS.dms) setDms(storageGet(STORAGE_KEYS.dms, {}));
      else if (e.key === STORAGE_KEYS.avatars) setAvatars(storageGet(STORAGE_KEYS.avatars, {}));
      else if (e.key === STORAGE_KEYS.bios) setBios(storageGet(STORAGE_KEYS.bios, {}));
      else if (e.key === STORAGE_KEYS.follows) setFollows(storageGet(STORAGE_KEYS.follows, {}));
      else if (currentUser && e.key === convosKeyFor(currentUser)) setPersonalConvos(storageGet(convosKeyFor(currentUser), seedConvos));
    };
    window.addEventListener("storage", onStorage);
    return () => window.removeEventListener("storage", onStorage);
  }, [currentUser]);

  const handleSignup = async (uname, pw) => {
    const next = { ...accounts, [uname]: pw };
    setAccounts(next);
    storageSet(STORAGE_KEYS.accounts, next);
    storageSet(STORAGE_KEYS.session, uname);
    setPersonalConvos(storageGet(convosKeyFor(uname), seedConvos));
    setLastSeenMessagesAt(storageGet(lastSeenKeyFor(uname), 0));
    setBookmarks(storageGet(bookmarksKeyFor(uname), []));
    setLastSeenActivityCount(storageGet(lastSeenActivityCountKeyFor(uname), 0));
    setCurrentUser(uname);
  };

  const handleLogin = async (uname) => {
    storageSet(STORAGE_KEYS.session, uname);
    setPersonalConvos(storageGet(convosKeyFor(uname), seedConvos));
    setLastSeenMessagesAt(storageGet(lastSeenKeyFor(uname), 0));
    setBookmarks(storageGet(bookmarksKeyFor(uname), []));
    setLastSeenActivityCount(storageGet(lastSeenActivityCountKeyFor(uname), 0));
    setCurrentUser(uname);
  };

  const handleLogout = async () => {
    storageSet(STORAGE_KEYS.session, null);
    setCurrentUser(null);
    setPersonalConvos([]);
    setLastSeenMessagesAt(0);
    setBookmarks([]);
    setLastSeenActivityCount(0);
    setTab("feed");
    setMessagesOpen(false);
    setActiveThread(null);
    setViewingProfile(null);
  };

  const handleOpenProfile = (user) => setViewingProfile(user);

  useEffect(() => {
    if (!activeThread) return;
    const isDm = activeThread.startsWith("dm:");
    const exists = isDm ? !!dms[activeThread] : personalConvos.some((c) => c.id === activeThread);
    if (!exists) setActiveThread(null);
  }, [activeThread, personalConvos, dms]);

  const handleAvatarChange = (dataUrlOrNull) => {
    setAvatars((prev) => {
      const next = { ...prev };
      if (dataUrlOrNull) next[currentUser] = dataUrlOrNull;
      else delete next[currentUser];
      storageSet(STORAGE_KEYS.avatars, next);
      return next;
    });
  };

  useEffect(() => {
    if (messagesOpen || tab === "messages" || (activeThread && activeThread.startsWith("dm:"))) {
      markMessagesSeen();
    }
    if (activeThread && activeThread.startsWith("dm:") && currentUser) {
      setDms((prev) => {
        const convo = prev[activeThread];
        if (!convo) return prev;
        const now = Date.now();
        if (convo.lastReadBy && convo.lastReadBy[currentUser] === now) return prev;
        const next = { ...prev, [activeThread]: { ...convo, lastReadBy: { ...(convo.lastReadBy || {}), [currentUser]: now } } };
        storageSet(STORAGE_KEYS.dms, next);
        return next;
      });
    }
  }, [messagesOpen, tab, activeThread]);

  const toggleLike = (id) => {
    setPosts((prev) => {
      const next = prev.map((p) => {
        if (p.id !== id) return p;
        const likedBy = p.likedBy || [];
        const already = likedBy.includes(currentUser);
        return { ...p, likedBy: already ? likedBy.filter((n) => n !== currentUser) : [...likedBy, currentUser] };
      });
      storageSet(STORAGE_KEYS.posts, next);
      return next;
    });
  };

  const addComment = (id, text) => {
    setPosts((prev) => {
      const next = prev.map((p) =>
        p.id === id
          ? { ...p, comments: [...p.comments, { id: Date.now() + "-" + Math.random().toString(36).slice(2), user: currentUser, text }] }
          : p
      );
      storageSet(STORAGE_KEYS.posts, next);
      return next;
    });
  };

  const handleDeleteComment = (postId, commentId) => {
    setPosts((prev) => {
      const next = prev.map((p) =>
        p.id === postId ? { ...p, comments: p.comments.filter((c) => (c.id != null ? c.id !== commentId : true)) } : p
      );
      storageSet(STORAGE_KEYS.posts, next);
      return next;
    });
  };

  const handleDeletePost = (id) => {
    setPosts((prev) => {
      const next = prev.filter((p) => p.id !== id);
      storageSet(STORAGE_KEYS.posts, next);
      return next;
    });
  };

  const handlePost = ({ caption, image, video, gradient }) => {
    const newPost = { id: "p" + Date.now(), user: { name: currentUser, color: C.violet }, caption, image, video, gradient, createdAt: Date.now(), baseLikes: 0, likedBy: [], comments: [] };
    setPosts((prev) => {
      const next = [newPost, ...prev];
      const saved = storageSet(STORAGE_KEYS.posts, next);
      if (!saved) {
        window.alert("Your post was shared, but it's too large to save permanently in this browser's storage (there's a small quota). It'll disappear if you reload the page. Try a smaller video/photo next time.");
      }
      return next;
    });
    setTab("feed");
  };

  const handleStartChat = (user) => {
    setViewingProfile(null);
    const isRealAccount = !!accounts[user.name];
    if (isRealAccount) {
      const id = dmIdFor(currentUser, user.name);
      setDms((prev) => {
        if (prev[id]) {
          setActiveThread(id);
          return prev;
        }
        const next = { ...prev, [id]: { id, participants: [currentUser, user.name], messages: [] } };
        storageSet(STORAGE_KEYS.dms, next);
        setActiveThread(id);
        return next;
      });
    } else {
      setPersonalConvos((prev) => {
        const existing = prev.find((c) => c.user.name === user.name);
        if (existing) {
          setActiveThread(existing.id);
          return prev;
        }
        const id = "chat-" + user.name;
        const next = [...prev, { id, user, messages: [], lastActivity: Date.now() }];
        storageSet(convosKeyFor(currentUser), next);
        setActiveThread(id);
        return next;
      });
    }
  };

  const handleSend = (convoId, text) => {
    if (convoId.startsWith("dm:")) {
      setDms((prev) => {
        const convo = prev[convoId];
        if (!convo) return prev;
        const msg = { id: Date.now() + "-" + Math.random().toString(36).slice(2), sender: currentUser, text, ts: Date.now() };
        const next = { ...prev, [convoId]: { ...convo, messages: [...convo.messages, msg] } };
        storageSet(STORAGE_KEYS.dms, next);
        return next;
      });
    } else {
      setPersonalConvos((prev) => {
        const next = prev.map((c) =>
          c.id === convoId
            ? { ...c, messages: [...c.messages, { id: Date.now() + "-" + Math.random().toString(36).slice(2), from: "me", text }], lastActivity: Date.now() }
            : c
        );
        storageSet(convosKeyFor(currentUser), next);
        return next;
      });
    }
  };

  // Combine the account's private demo-contact chats with any real shared DMs it's part of
  const dmList = Object.values(dms)
    .filter((d) => d.participants.includes(currentUser))
    .map((d) => {
      const otherName = d.participants.find((n) => n !== currentUser) || d.participants[0];
      const last = d.messages[d.messages.length - 1];
      const otherLastRead = (d.lastReadBy && d.lastReadBy[otherName]) || 0;
      return {
        id: d.id,
        user: { name: otherName, color: colorForName(otherName), imageUrl: avatars[otherName], online: true, real: true },
        messages: d.messages.map((m) => ({
          id: m.id, from: m.sender === currentUser ? "me" : "them", text: m.text,
          seen: m.sender === currentUser && (m.ts || 0) <= otherLastRead,
        })),
        lastActivity: last ? last.ts : 0,
      };
    });
  const messagesList = [...personalConvos, ...dmList];
  const activeConvo = messagesList.find((c) => c.id === activeThread) || null;
  const hasUnread = dmList.some((c) => {
    const last = c.messages[c.messages.length - 1];
    return last && last.from === "them" && (c.lastActivity || 0) > lastSeenMessagesAt;
  });

  // Derived activity feed: likes/comments on your posts, and new followers - computed
  // live from existing data rather than a separate persisted notification log.
  const activityItems = [];
  posts.filter((p) => p.user.name === currentUser).forEach((p) => {
    (p.likedBy || []).forEach((name) => {
      if (name === currentUser) return;
      activityItems.push({ type: "like", user: { name, color: colorForName(name), imageUrl: avatars[name] }, text: "liked your post" });
    });
    (p.comments || []).forEach((c) => {
      if (c.user === currentUser) return;
      activityItems.push({ type: "comment", user: { name: c.user, color: colorForName(c.user), imageUrl: avatars[c.user] }, text: `commented: "${c.text}"` });
    });
  });
  Object.entries(follows).forEach(([followerName, list]) => {
    if (followerName !== currentUser && list.includes(currentUser)) {
      activityItems.push({ type: "follow", user: { name: followerName, color: colorForName(followerName), imageUrl: avatars[followerName] }, text: "started following you" });
    }
  });
  const hasNewActivity = activityItems.length > lastSeenActivityCount;

  useEffect(() => {
    if (tab === "activity") markActivitySeen(activityItems.length);
  }, [tab, activityItems.length]);

  const followingList = follows[currentUser] || [];
  const followerCountFor = (name) => Object.entries(follows).filter(([n, list]) => n !== name && list.includes(name)).length;
  const followingCountFor = (name) => (follows[name] || []).length;

  const isDesktop = useIsDesktop();
  const viewportHeight = useViewportHeight();
  const C = THEMES[themeName] || DEFAULT_THEME;

  return (
    <ThemeContext.Provider value={C}>
    <div style={{ width: "100%", height: viewportHeight, background: C.bg, display: "flex", justifyContent: "center" }}>
      {loading ? (
        <div style={{ width: "100%", maxWidth: 420, height: "100%", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Logo size={26} />
        </div>
      ) : !currentUser ? (
        <div style={{ width: "100%", height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}>
          <AuthScreen accounts={accounts} onSignup={handleSignup} onLogin={handleLogin} canInstallPrompt={!!deferredPrompt} onInstallClick={handleInstallClick} />
        </div>
      ) : activeThread ? (
        <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", fontFamily: "'Inter', sans-serif" }}>
          <ThreadScreen convo={activeConvo} onBack={() => setActiveThread(null)} onSend={handleSend} />
        </div>
      ) : viewingProfile ? (
        <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}>
          <UserProfileScreen
            user={viewingProfile}
            posts={posts}
            avatars={avatars}
            currentUser={currentUser}
            onBack={() => setViewingProfile(null)}
            onMessage={handleStartChat}
            toggleLike={toggleLike}
            addComment={addComment}
            onDeleteComment={handleDeleteComment}
            onOpenProfile={handleOpenProfile}
            onDeletePost={handleDeletePost}
            bio={bios[viewingProfile.name]}
            canFollow={!!accounts[viewingProfile.name]}
            isFollowing={followingList.includes(viewingProfile.name)}
            onToggleFollow={handleToggleFollow}
            followerCount={followerCountFor(viewingProfile.name)}
            followingCount={followingCountFor(viewingProfile.name)}
            bookmarks={bookmarks}
            onToggleBookmark={handleToggleBookmark}
          />
        </div>
      ) : messagesOpen ? (
        <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}>
          <MessagesScreen convos={messagesList} onOpenThread={(id) => setActiveThread(id)} onBack={() => setMessagesOpen(false)} />
        </div>
      ) : (
        <div style={{ width: "100%", maxWidth: isDesktop ? 1040 : 420, height: "100%", display: "flex", fontFamily: "'Inter', sans-serif" }}>
          {isDesktop && <SideNav tab={tab} setTab={setTab} currentUser={currentUser} avatarUrl={avatars[currentUser]} hasUnread={hasUnread} hasNewActivity={hasNewActivity} />}
          <div style={{ flex: 1, height: "100%", position: "relative", overflow: tab === "reels" ? "hidden" : "visible" }}>
            {tab === "reels" ? (
              <ReelsScreen posts={posts} avatars={avatars} toggleLike={toggleLike} addComment={addComment} onOpenProfile={handleOpenProfile} onDeletePost={handleDeletePost} currentUser={currentUser} />
            ) : (
              <div style={{ height: "100%", overflowY: "auto" }}>
                <div style={{ maxWidth: isDesktop ? 600 : "100%", margin: isDesktop ? "0 auto" : 0 }}>
                  {tab === "feed" && (
                    <FeedScreen
                      posts={posts} avatars={avatars} toggleLike={toggleLike} addComment={addComment} onDeleteComment={handleDeleteComment}
                      onOpenMessages={() => setMessagesOpen(true)} onOpenProfile={handleOpenProfile} onDeletePost={handleDeletePost}
                      currentUser={currentUser} youAvatar={avatars[currentUser]} hasUnread={hasUnread}
                      bookmarks={bookmarks} onToggleBookmark={handleToggleBookmark}
                    />
                  )}
                  {tab === "search" && <SearchScreen accounts={accounts} currentUser={currentUser} avatars={avatars} posts={posts} onViewProfile={handleOpenProfile} onRefreshAccounts={handleRefreshAccounts} />}
                  {tab === "create" && <CreateScreen onPost={handlePost} />}
                  {tab === "activity" && <ActivityScreen items={activityItems} avatars={avatars} onOpenProfile={handleOpenProfile} />}
                  {tab === "messages" && <MessagesScreen convos={messagesList} onOpenThread={(id) => setActiveThread(id)} onBack={() => setTab("feed")} />}
                  {tab === "profile" && (
                    <ProfileScreen
                      currentUser={currentUser} avatarUrl={avatars[currentUser]} onAvatarChange={handleAvatarChange} onLogout={handleLogout}
                      posts={posts} toggleLike={toggleLike} addComment={addComment} onDeleteComment={handleDeleteComment} onDeletePost={handleDeletePost}
                      themeName={themeName} onThemeChange={handleThemeChange}
                      bio={bios[currentUser]} onBioChange={handleBioChange}
                      followerCount={followerCountFor(currentUser)} followingCount={followingCountFor(currentUser)}
                      bookmarks={bookmarks} onToggleBookmark={handleToggleBookmark}
                    />
                  )}
                </div>
              </div>
            )}
            {!isDesktop && <BottomNav tab={tab} setTab={setTab} hasUnread={hasUnread} hasNewActivity={hasNewActivity} />}
          </div>
        </div>
      )}
    </div>
    </ThemeContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Bjsenjer />);
</script>
</body>
</html>
