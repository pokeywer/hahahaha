<!DOCTYPE html>
<html lang="en">
<head>

<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTQiIGZpbGw9IiMxNDEyMUYiLz48cGF0aCBkPSJNMzUgOCAxNCAzNmgxMmwtMyAyMCAyMS0yOEgzMnoiIGZpbGw9IiNGRjZGNjEiLz48L3N2Zz4K" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>

<style>
  html, body { margin: 0; padding: 0; background: #14121F; height: 100%; overflow: hidden; overscroll-behavior: none; -webkit-text-size-adjust: 100%; }
  body { position: fixed; inset: 0; width: 100%; }
  #root { height: 100%; width: 100%; }
  * { box-sizing: border-box; }
  input::placeholder, textarea::placeholder { color: #8A87A0; }
  input:focus, textarea:focus { border-color: #7C5CFC !important; }
  div::-webkit-scrollbar { display: none; }
  button { font-family: inherit; transition: opacity 0.15s ease, transform 0.1s ease, background-color 0.15s ease, border-color 0.15s ease; }
  button:active { transform: scale(0.97); }
  @media (hover: hover) { button:hover { opacity: 0.85; } }
  a, button, [role="button"] { -webkit-tap-highlight-color: transparent; }
  img, video { transition: opacity 0.2s ease; }

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useContext } = React;

// ---------- custom SVG icon set ----------
function StrokeSvg({ size = 20, color = "currentColor", style = {}, strokeWidth = 2, children }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={{ display: "block", flexShrink: 0, ...style }}>
      {children}
    </svg>
  );
}
function FillSvg({ size = 20, color = "currentColor", style = {}, children }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={color} style={{ display: "block", flexShrink: 0, ...style }}>
      {children}
    </svg>
  );
}
const Home = (p) => (<StrokeSvg {...p}><path d="M4 11.5 12 4l8 7.5" /><path d="M6 10v9a1 1 0 0 0 1 1h4v-6h2v6h4a1 1 0 0 0 1-1v-9" /></StrokeSvg>);
const Search = (p) => (<StrokeSvg {...p}><circle cx="10.5" cy="10.5" r="6.5" /><line x1="15.3" y1="15.3" x2="20.5" y2="20.5" /></StrokeSvg>);
const PlusSquare = (p) => (<StrokeSvg {...p}><rect x="3.5" y="3.5" width="17" height="17" rx="4" /><line x1="12" y1="8" x2="12" y2="16" /><line x1="8" y1="12" x2="16" y2="12" /></StrokeSvg>);
const MessageCircle = (p) => (<StrokeSvg {...p}><path d="M21 11.5a8.5 8.5 0 0 1-12.4 7.55L3 21l1.95-5.6A8.5 8.5 0 1 1 21 11.5Z" /></StrokeSvg>);
const User = (p) => (<StrokeSvg {...p}><circle cx="12" cy="8" r="3.6" /><path d="M4.5 20c0-4 3.3-7 7.5-7s7.5 3 7.5 7" /></StrokeSvg>);
const Heart = ({ fill, color = "currentColor", ...rest }) => {
  const isFilled = fill && fill !== "none";
  const d = "M12 21S3.6 15.9 3.6 9.6C3.6 6.5 5.9 4.3 8.7 4.3c1.7 0 3.1.8 3.9 2.1.8-1.3 2.2-2.1 3.9-2.1 2.8 0 5.1 2.2 5.1 5.3 0 6.3-8.4 11.4-9.6 11.4Z";
  return isFilled ? (<FillSvg {...rest} color={fill}><path d={d} /></FillSvg>) : (<StrokeSvg {...rest} color={color}><path d={d} /></StrokeSvg>);
};
const MessageSquare = (p) => (<StrokeSvg {...p}><path d="M4 4.5h16a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H9.5L5 21v-3.5H4a1 1 0 0 1-1-1v-11a1 1 0 0 1 1-1Z" /></StrokeSvg>);
const Send = ({ color = "currentColor", ...rest }) => (<FillSvg {...rest} color={color}><path d="M2.5 11.5 21 3.2l-6.4 18.1-3-7-7-2.8 -2.1-.5Z" stroke={color} strokeWidth="1" strokeLinejoin="round" /></FillSvg>);
const ArrowLeft = (p) => (<StrokeSvg {...p}><line x1="20" y1="12" x2="4" y2="12" /><polyline points="10,6 4,12 10,18" /></StrokeSvg>);
const LogOut = (p) => (<StrokeSvg {...p}><path d="M9.5 4.5H5.8a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1H9.5" /><polyline points="14.5,8 19,12 14.5,16" /><line x1="19" y1="12" x2="9" y2="12" /></StrokeSvg>);
const MoreHorizontal = ({ size = 20, color = "currentColor", style = {} }) => (<FillSvg size={size} color={color} style={style}><circle cx="5.5" cy="12" r="1.9" /><circle cx="12" cy="12" r="1.9" /><circle cx="18.5" cy="12" r="1.9" /></FillSvg>);
const ImageIcon = (p) => (<StrokeSvg {...p}><rect x="3.5" y="4.5" width="17" height="15" rx="2" /><circle cx="8.7" cy="9.7" r="1.6" /><path d="M21 15.5 15.8 10 6 19" /></StrokeSvg>);
const Zap = ({ size = 20, color = "currentColor", style = {} }) => (<FillSvg size={size} color={color} style={style}><path d="M13.2 2 4.4 14h5.9l-1 8L18 10h-5.9z" /></FillSvg>);
const Camera = (p) => (<StrokeSvg {...p}><path d="M4 8.2h3.1l1.8-2.2h6.2l1.8 2.2H20a1 1 0 0 1 1 1V19a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.2a1 1 0 0 1 1-1Z" /><circle cx="12" cy="14" r="3.4" /></StrokeSvg>);
const X = (p) => (<StrokeSvg {...p}><line x1="5.5" y1="5.5" x2="18.5" y2="18.5" /><line x1="18.5" y1="5.5" x2="5.5" y2="18.5" /></StrokeSvg>);

// ---------- design tokens: multiple switchable themes ----------
const THEMES = {
  nightlife: { label: "Nightlife", swatch: ["#14121F", "#7C5CFC", "#FF6F61"], bg: "#14121F", panel: "#1C1930", panel2: "#241F3D", line: "#332C55", text: "#F3F1FF", muted: "#8A87A0", violet: "#7C5CFC", violetSoft: "#5A45B8", coral: "#FF6F61", mint: "#33D6A6" },
  sunset: { label: "Sunset", swatch: ["#20140F", "#FF7A45", "#FFC145"], bg: "#20140F", panel: "#2C1B14", panel2: "#3B241A", line: "#5A3826", text: "#FFF3EA", muted: "#C29A82", violet: "#FF7A45", violetSoft: "#C2531F", coral: "#FFC145", mint: "#4ECDC4" },
  ocean: { label: "Ocean", swatch: ["#0B1620", "#2FB6D9", "#FF8A65"], bg: "#0B1620", panel: "#122232", panel2: "#183044", line: "#254257", text: "#EAF6FF", muted: "#7FA3BE", violet: "#2FB6D9", violetSoft: "#1C87A6", coral: "#FF8A65", mint: "#3DDC97" },
  forest: { label: "Forest", swatch: ["#101A12", "#5BAE5B", "#E0A63A"], bg: "#101A12", panel: "#17251A", panel2: "#203323", line: "#33502F", text: "#EFFBEE", muted: "#93B08E", violet: "#5BAE5B", violetSoft: "#3E7A3E", coral: "#E0A63A", mint: "#7ED957" },
  rose: { label: "Rose", swatch: ["#1A0F16", "#FF5C8A", "#FF9A76"], bg: "#1A0F16", panel: "#26161F", panel2: "#341E2B", line: "#4F2C40", text: "#FFEEF5", muted: "#C084A6", violet: "#FF5C8A", violetSoft: "#C23D66", coral: "#FF9A76", mint: "#5FE0C0" },
  mono: { label: "Mono", swatch: ["#121212", "#E5E5E5", "#9A9A9A"], bg: "#121212", panel: "#1B1B1B", panel2: "#242424", line: "#3A3A3A", text: "#F5F5F5", muted: "#9A9A9A", violet: "#E5E5E5", violetSoft: "#B5B5B5", coral: "#FFFFFF", mint: "#CFCFCF" },
};
const DEFAULT_THEME = THEMES.nightlife;
const ThemeContext = React.createContext(DEFAULT_THEME);
const AVATAR_COLORS = ["#7C5CFC", "#FF6F61", "#33D6A6", "#FFD166", "#5A45B8", "#4FA8FF"];

function colorForName(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[hash % AVATAR_COLORS.length];
}
function timeAgo(ts) {
  if (!ts) return "";
  const diff = Math.max(0, Date.now() - ts);
  const min = Math.floor(diff / 60000);
  if (min < 1) return "Just now";
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day < 7) return `${day}d ago`;
  return `${Math.floor(day / 7)}w ago`;
}

// ---------- API client ----------
async function api(path, { method = "GET", body, token } = {}) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers["Authorization"] = "Bearer " + token;
  const res = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  let data = null;
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) {
    const err = new Error((data && data.error) || "Request failed (" + res.status + ")");
    err.status = res.status;
    throw err;
  }
  return data;
}

function Avatar({ name, color, imageUrl, size = 40, ring = false, online = false }) {
  const C = useContext(ThemeContext);
  const initial = (name || "?").charAt(0).toUpperCase();
  return (
    <div style={{ position: "relative", width: size, height: size, flexShrink: 0 }}>
      <div style={{ width: size, height: size, borderRadius: "50%", padding: ring ? 2.5 : 0, background: ring ? "conic-gradient(from 210deg,#FF6F61,#7C5CFC,#33D6A6,#FF6F61)" : "transparent" }}>
        {imageUrl ? (
          <img src={imageUrl} alt={name} style={{ width: "100%", height: "100%", borderRadius: "50%", objectFit: "cover", display: "block", border: ring ? `2px solid ${C.bg}` : "none" }} />
        ) : (
          <div style={{ width: "100%", height: "100%", borderRadius: "50%", background: color || colorForName(name || "?"), display: "flex", alignItems: "center", justifyContent: "center", color: "#14121F", fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: size * 0.42, border: ring ? `2px solid ${C.bg}` : "none" }}>
            {initial}
          </div>
        )}
      </div>
      {online && <div style={{ position: "absolute", bottom: 0, right: 0, width: size * 0.28, height: size * 0.28, borderRadius: "50%", background: C.mint, border: `2px solid ${C.bg}` }} />}
    </div>
  );
}

function Logo({ size = 22 }) {
  const C = useContext(ThemeContext);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <Zap size={size} color={C.coral} />
      <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: size * 0.95, letterSpacing: "-0.03em", color: C.text }}>Bjsenjer</span>
    </div>
  );
}

function inputStyleFor(C) {
  return { width: "100%", boxSizing: "border-box", background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, padding: "11px 12px", color: C.text, fontSize: 14, outline: "none", fontFamily: "'Inter', sans-serif" };
}
function primaryBtnFor(C) {
  return { width: "100%", marginTop: 20, background: `linear-gradient(135deg,${C.violet},${C.coral})`, border: "none", borderRadius: 10, padding: "12px 0", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "'Space Grotesk', sans-serif" };
}
const iconBtn = { background: "none", border: "none", cursor: "pointer", padding: 0, display: "flex" };

// ---------------- AUTH ----------------
function AuthScreen({ onAuthed }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    if (e && e.preventDefault) e.preventDefault();
    if (!username.trim() || !password) { setError("Fill in both fields to continue."); return; }
    setError("");
    setBusy(true);
    try {
      const data = await api(mode === "login" ? "/api/login" : "/api/signup", {
        method: "POST",
        body: { username: username.trim(), password },
      });
      onAuthed(data.token, data.username);
    } catch (err) {
      setError(err.message || "Something went wrong.");
    }
    setBusy(false);
  };

  return (
    <div style={{ minHeight: "100%", background: `radial-gradient(circle at 20% 0%, ${C.violetSoft}33, transparent 60%), ${C.bg}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: "'Inter', sans-serif" }}>
      <div style={{ marginBottom: 28 }}><Logo size={30} /></div>
      <div style={{ width: "100%", maxWidth: 340, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 18, padding: 24 }}>
        <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 19, margin: "0 0 4px", color: C.text }}>{mode === "login" ? "Welcome back" : "Create your account"}</h1>
        <p style={{ color: C.muted, fontSize: 13, margin: "0 0 20px" }}>{mode === "login" ? "Log in to see your feed and messages." : "This account works from any device now."}</p>

        <label style={{ fontSize: 12, color: C.muted, display: "block", marginBottom: 6 }}>Username</label>
        <input value={username} onChange={(e) => setUsername(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)} placeholder="yourname" style={inputStyle} autoComplete="username" />

        <label style={{ fontSize: 12, color: C.muted, display: "block", margin: "14px 0 6px" }}>Password</label>
        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)} placeholder="••••••••" style={inputStyle} autoComplete={mode === "login" ? "current-password" : "new-password"} />

        {error && <p style={{ color: C.coral, fontSize: 12.5, marginTop: 12, background: "#FF6F6120", padding: "8px 10px", borderRadius: 8 }}>{error}</p>}

        <button type="button" onClick={submit} disabled={busy} style={{ ...primaryBtn, opacity: busy ? 0.6 : 1 }}>
          {busy ? "Please wait..." : mode === "login" ? "Log in" : "Create account"}
        </button>

        <p style={{ textAlign: "center", fontSize: 13, color: C.muted, marginTop: 18 }}>
          {mode === "login" ? "New here?" : "Already have an account?"}{" "}
          <span onClick={() => { setMode(mode === "login" ? "signup" : "login"); setError(""); }} style={{ color: C.mint, cursor: "pointer", fontWeight: 600 }}>
            {mode === "login" ? "Create one" : "Log in instead"}
          </span>
        </p>
      </div>
    </div>
  );
}

// ---------------- POST CARD ----------------
function PostCard({ post, currentUser, onLike, onComment, onDeleteComment, onDelete, onOpenProfile }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const [draft, setDraft] = useState("");
  const [showComments, setShowComments] = useState(false);
  const [showMenu, setShowMenu] = useState(false);
  const [showBigHeart, setShowBigHeart] = useState(false);
  const menuRef = useRef(null);
  const isOwn = post.user === currentUser;
  const likedByMe = (post.likedBy || []).includes(currentUser);
  const likeCount = (post.likedBy || []).length;

  useEffect(() => {
    if (!showMenu) return;
    const onDoc = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setShowMenu(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [showMenu]);

  const submitComment = () => {
    if (!draft.trim()) return;
    onComment(post.id, draft.trim());
    setDraft("");
  };
  const confirmDelete = () => {
    setShowMenu(false);
    if (window.confirm("Delete this post? This can't be undone.")) onDelete(post.id);
  };
  const handleDoubleTap = () => {
    if (!likedByMe) onLike(post.id);
    setShowBigHeart(true);
    setTimeout(() => setShowBigHeart(false), 700);
  };

  return (
    <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, marginBottom: 18, overflow: "hidden", boxShadow: "0 4px 18px rgba(0,0,0,0.28)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, cursor: "pointer" }} onClick={() => onOpenProfile(post.user)}>
          <Avatar name={post.user} color={colorForName(post.user)} size={36} ring />
          <div style={{ flex: 1 }}>
            <div style={{ color: C.text, fontWeight: 600, fontSize: 13.5 }}>{post.user}</div>
            <div style={{ color: C.muted, fontSize: 11 }}>{timeAgo(post.createdAt)}</div>
          </div>
        </div>
        <div ref={menuRef} style={{ position: "relative" }}>
          <button onClick={() => setShowMenu((s) => !s)} style={iconBtn}><MoreHorizontal size={18} color={C.muted} /></button>
          {showMenu && (
            <div style={{ position: "absolute", top: 24, right: 0, background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, overflow: "hidden", zIndex: 5, minWidth: 130 }}>
              {isOwn ? (
                <button onClick={confirmDelete} style={{ display: "block", width: "100%", padding: "10px 14px", background: "none", border: "none", color: C.coral, fontSize: 13, cursor: "pointer", textAlign: "left", whiteSpace: "nowrap" }}>Delete post</button>
              ) : (
                <div style={{ padding: "10px 14px", color: C.muted, fontSize: 12.5, whiteSpace: "nowrap" }}>Nothing here yet</div>
              )}
            </div>
          )}
        </div>
      </div>

      {post.image && (
        <div onDoubleClick={handleDoubleTap} style={{ position: "relative", width: "100%", aspectRatio: "4 / 5", background: "#000", overflow: "hidden" }}>
          <img src={post.image} alt={post.caption} loading="lazy" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
          {showBigHeart && (
            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
              <Heart size={84} color="#fff" fill="#fff" style={{ filter: "drop-shadow(0 4px 14px rgba(0,0,0,0.5))" }} />
            </div>
          )}
        </div>
      )}

      <div style={{ padding: "12px 14px" }}>
        <div style={{ display: "flex", gap: 16, marginBottom: 10 }}>
          <button onClick={() => onLike(post.id)} style={iconBtn}><Heart size={22} color={likedByMe ? C.coral : C.text} fill={likedByMe ? C.coral : "none"} /></button>
          <button onClick={() => setShowComments((s) => !s)} style={iconBtn}><MessageSquare size={22} color={C.text} /></button>
        </div>
        <div style={{ color: C.text, fontSize: 13.5, fontWeight: 700, marginBottom: 4 }}>{likeCount} likes</div>
        {post.caption && (
          <div style={{ color: C.text, fontSize: 13.5, marginBottom: showComments ? 10 : 0 }}>
            <span style={{ fontWeight: 700 }}>{post.user}</span> {post.caption}
          </div>
        )}

        {showComments && (
          <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 10 }}>
            {post.comments.length === 0 && <div style={{ color: C.muted, fontSize: 12.5, marginBottom: 8 }}>No comments yet — say something.</div>}
            {post.comments.map((c) => (
              <div key={c.id} style={{ fontSize: 13, color: C.text, marginBottom: 6, display: "flex", gap: 6 }}>
                <div style={{ flex: 1 }}><span style={{ fontWeight: 700 }}>{c.user}</span> {c.text}</div>
                {c.user === currentUser && <button onClick={() => onDeleteComment(post.id, c.id)} style={iconBtn}><X size={12} color={C.muted} /></button>}
              </div>
            ))}
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) submitComment(); }} placeholder="Add a comment..." style={{ ...inputStyle, flex: 1, padding: "8px 10px", fontSize: 12.5 }} />
              <button onClick={submitComment} style={{ ...primaryBtn, width: "auto", marginTop: 0, padding: "0 14px", fontSize: 12.5 }}>Post</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------------- FEED ----------------
function FeedScreen({ posts, currentUser, onLike, onComment, onDeleteComment, onDelete, onOpenProfile, onOpenMessages }) {
  const C = useContext(ThemeContext);
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", borderBottom: `1px solid ${C.line}`, position: "sticky", top: 0, background: C.bg, zIndex: 5 }}>
        <Logo />
        <button onClick={onOpenMessages} style={iconBtn}><MessageCircle size={23} color={C.text} /></button>
      </div>
      <div style={{ padding: "14px 14px 90px" }}>
        {posts.length === 0 && <div style={{ color: C.muted, fontSize: 13, textAlign: "center", marginTop: 30 }}>No posts yet. Be the first to share something.</div>}
        {posts.map((p) => (
          <PostCard key={p.id} post={p} currentUser={currentUser} onLike={onLike} onComment={onComment} onDeleteComment={onDeleteComment} onDelete={onDelete} onOpenProfile={onOpenProfile} />

}

function SearchScreen({ token, currentUser, onOpenProfile }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const [q, setQ] = useState("");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    const t = setTimeout(async () => {
      try {
        const data = await api("/api/search?q=" + encodeURIComponent(q));
        if (!cancelled) setResults(data.results.filter((r) => r.username !== currentUser));
      } catch (e) {}
      if (!cancelled) setLoading(false);
    }, 200);
    return () => { cancelled = true; clearTimeout(t); };
  }, [q]);

  return (
    <div style={{ padding: "16px 16px 90px" }}>
      <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search people..." style={{ ...inputStyle, marginBottom: 16 }} />
      {loading && <div style={{ color: C.muted, fontSize: 12.5, marginBottom: 10 }}>Searching...</div>}
      {!loading && results.length === 0 && <div style={{ color: C.muted, fontSize: 13, textAlign: "center", marginTop: 24 }}>No one found.</div>}
      {results.map((u) => (
        <div key={u.username} onClick={() => onOpenProfile(u.username)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 2px", cursor: "pointer" }}>

        </div>
      ))}
    </div>
  );
}

// ---------------- CREATE ----------------
function CreateScreen({ token, onPosted }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const [caption, setCaption] = useState("");
  const [imageUrl, setImageUrl] = useState(null);
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [processing, setProcessing] = useState(false);
  const fileRef = useRef(null);

  const pickFile = () => fileRef.current && fileRef.current.click();

  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    if (!file.type.startsWith("image/")) { setError("Please choose an image file."); return; }
    setError("");
    setProcessing(true);
    const reader = new FileReader();
    reader.onload = () => {
      const img = new window.Image();
      img.onload = () => {
        const maxDim = 1080;
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        setImageUrl(canvas.toDataURL("image/jpeg", 0.78));
        setProcessing(false);
      };
      img.onerror = () => { setError("Couldn't read that image."); setProcessing(false); };
      img.src = reader.result;
    };
    reader.onerror = () => { setError("Couldn't read that file."); setProcessing(false); };
    reader.readAsDataURL(file);
  };

  const submit = async () => {
    if (!caption.trim() && !imageUrl) return;
    setBusy(true);
    setError("");
    try {
      await api("/api/posts", { method: "POST", token, body: { caption: caption.trim(), image: imageUrl } });
      setCaption(""); setImageUrl(null);
      onPosted();
    } catch (err) {
      setError(err.message || "Couldn't share that post.");
    }
    setBusy(false);
  };

  return (
    <div style={{ padding: "16px 16px 90px" }}>
      <div onClick={!imageUrl ? pickFile : undefined} style={{ height: 260, borderRadius: 16, overflow: "hidden", marginBottom: 12, position: "relative", cursor: !imageUrl ? "pointer" : "default", background: C.panel2, display: "flex", alignItems: "center", justifyContent: "center" }}>
        {processing ? (
          <span style={{ color: C.muted, fontSize: 13 }}>Processing...</span>
        ) : imageUrl ? (
          <img src={imageUrl} alt="Your upload" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        ) : (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
            <ImageIcon size={30} color={C.muted} />
            <span style={{ color: C.muted, fontSize: 12.5 }}>Tap to add a photo</span>
          </div>
        )}
        {imageUrl && (
          <button onClick={(e) => { e.stopPropagation(); setImageUrl(null); }} style={{ position: "absolute", top: 10, right: 10, width: 28, height: 28, borderRadius: "50%", background: "rgba(0,0,0,0.55)", border: "none", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
            <X size={14} color="#fff" />
          </button>
        )}
      </div>
      <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
      {!imageUrl && <button type="button" onClick={pickFile} style={{ ...primaryBtn, marginTop: 0, marginBottom: 14, background: C.panel2, border: `1px solid ${C.line}` }}>Choose photo</button>}
      {error && <p style={{ color: C.coral, fontSize: 12.5, marginBottom: 12, background: "#FF6F6120", padding: "8px 10px", borderRadius: 8 }}>{error}</p>}
      <textarea value={caption} onChange={(e) => setCaption(e.target.value)} placeholder="Write a caption..." rows={4} style={{ ...inputStyle, resize: "none", marginBottom: 14 }} />
      <button onClick={submit} disabled={busy} style={{ ...primaryBtn, opacity: busy ? 0.6 : 1 }}>{busy ? "Sharing..." : "Share to feed"}</button>
    </div>
  );
}

// ---------------- PROFILE (own) ----------------
function ProfileScreen({ token, currentUser, themeName, onThemeChange, onLogout, onOpenProfile, refreshKey }) {
  const C = useContext(ThemeContext);
  const primaryBtn = primaryBtnFor(C);
  const inputStyle = inputStyleFor(C);
  const fileRef = useRef(null);
  const [profile, setProfile] = useState(null);
  const [myPosts, setMyPosts] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [error, setError] = useState("");
  const [editingBio, setEditingBio] = useState(false);
  const [bioDraft, setBioDraft] = useState("");

  const load = async () => {
    try {
      const p = await api("/api/me", { token });
      setProfile(p);
      setBioDraft(p.bio || "");
      const feed = await api("/api/posts");
      setMyPosts(feed.posts.filter((post) => post.user === currentUser));
    } catch (e) {}
  };

  useEffect(() => { load(); }, [refreshKey]);

  const pickFile = () => fileRef.current && fileRef.current.click();
  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    if (!file.type.startsWith("image/")) { setError("Please choose an image file."); return; }
    setError(""); setUploading(true);
    const reader = new FileReader();
    reader.onload = () => {
      const img = new window.Image();
      img.onload = () => {
        const size = 300;
        const canvas = document.createElement("canvas");
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext("2d");
        const scale = Math.max(size / img.width, size / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        api("/api/me", { method: "POST", token, body: { avatar: dataUrl } })
          .then(() => load())
          .catch((err) => setError(err.message))
          .finally(() => setUploading(false));
      };
      img.onerror = () => { setError("Couldn't read that image."); setUploading(false); };
      img.src = reader.result;
    };
    reader.onerror = () => { setError("Couldn't read that file."); setUploading(false); };
    reader.readAsDataURL(file);
  };

  const saveBio = async () => {
    try {
      await api("/api/me", { method: "POST", token, body: { bio: bioDraft.trim() } });
      setEditingBio(false);
      load();
    } catch (err) { setError(err.message); }
  };

  const deletePost = async (id) => {
    try { await api("/api/posts?id=" + id, { method: "DELETE", token }); load(); } catch (e) {}
  };
  const likePost = async (id) => {
    try { const r = await api("/api/posts?id=" + id + "&action=like", { method: "POST", token }); setMyPosts((prev) => prev.map((p) => (p.id === id ? r.post : p))); } catch (e) {}
  };
  const commentPost = async (id, text) => {
    try { const r = await api("/api/posts?id=" + id + "&action=comment", { method: "POST", token, body: { text } }); setMyPosts((prev) => prev.map((p) => (p.id === id ? r.post : p))); } catch (e) {}
  };
  const deleteComment = async (id, commentId) => {
    try { const r = await api("/api/posts?id=" + id + "&action=deleteComment", { method: "POST", token, body: { commentId } }); setMyPosts((prev) => prev.map((p) => (p.id === id ? r.post : p))); } catch (e) {}
  };

  if (!profile) return <div style={{ padding: 24, color: C.muted, fontSize: 13 }}>Loading...</div>;

  return (
    <div style={{ padding: "20px 18px 90px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 12 }}>
        <div style={{ position: "relative" }} onClick={pickFile}>
          <Avatar name={currentUser} color={C.violet} imageUrl={profile.avatar} size={72} ring />
          <div style={{ position: "absolute", bottom: -2, right: -2, width: 26, height: 26, borderRadius: "50%", background: C.violet, display: "flex", alignItems: "center", justifyContent: "center", border: `2px solid ${C.bg}`, cursor: "pointer" }}>
            <Camera size={13} color="#fff" />
          </div>
        </div>
        <div>
          <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 19, color: C.text }}>{currentUser}</div>
          <div style={{ color: C.muted, fontSize: 12.5, marginTop: 2 }}>Bjsenjer member</div>
          <button onClick={pickFile} disabled={uploading} style={{ background: "none", border: "none", color: C.mint, fontSize: 12.5, fontWeight: 600, cursor: "pointer", padding: 0, marginTop: 6 }}>
            {uploading ? "Uploading..." : "Edit profile picture"}
          </button>
        </div>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
      </div>

      {error && <div style={{ color: C.coral, fontSize: 12, marginBottom: 12 }}>{error}</div>}

      {editingBio ? (
        <div style={{ marginBottom: 16 }}>
          <textarea value={bioDraft} onChange={(e) => setBioDraft(e.target.value.slice(0, 150))} placeholder="Write a short bio..." rows={3} style={{ ...inputStyle, resize: "none", marginBottom: 8 }} />
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={saveBio} style={{ ...primaryBtn, marginTop: 0, width: "auto", padding: "8px 16px", fontSize: 12.5 }}>Save</button>
            <button onClick={() => { setEditingBio(false); setBioDraft(profile.bio || ""); }} style={{ background: "none", border: `1px solid ${C.line}`, color: C.muted, fontSize: 12.5, borderRadius: 8, padding: "8px 16px", cursor: "pointer" }}>Cancel</button>
          </div>
        </div>
      ) : (
        <div style={{ marginBottom: 16 }}>
          {profile.bio ? <div style={{ color: C.text, fontSize: 13.5, lineHeight: 1.5, marginBottom: 6 }}>{profile.bio}</div> : <div style={{ color: C.muted, fontSize: 13, marginBottom: 6, fontStyle: "italic" }}>No bio yet.</div>}
          <button onClick={() => setEditingBio(true)} style={{ background: "none", border: "none", color: C.mint, fontSize: 12.5, fontWeight: 600, cursor: "pointer", padding: 0 }}>{profile.bio ? "Edit bio" : "Add a bio"}</button>
        </div>
      )}

      <div style={{ display: "flex", gap: 24, padding: "14px 0", borderTop: `1px solid ${C.line}`, borderBottom: `1px solid ${C.line}`, marginBottom: 20 }}>
        {[["Posts", myPosts.length], ["Followers", profile.followerCount], ["Following", profile.followingCount]].map(([label, val]) => (
          <div key={label}><div style={{ color: C.text, fontWeight: 700, fontSize: 16 }}>{val}</div><div style={{ color: C.muted, fontSize: 11.5 }}>{label}</div></div>
        ))}
      </div>

      <div style={{ marginBottom: 20 }}>
        <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 14, color: C.text, marginBottom: 10 }}>Appearance</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          {Object.entries(THEMES).map(([key, t]) => (
            <button key={key} onClick={() => onThemeChange(key)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, background: "none", border: `2px solid ${themeName === key ? C.violet : "transparent"}`, borderRadius: 12, padding: 6, cursor: "pointer" }}>
              <div style={{ width: 52, height: 52, borderRadius: 8, overflow: "hidden", display: "flex" }}>{t.swatch.map((sw, i) => <div key={i} style={{ flex: 1, background: sw }} />)}</div>
              <span style={{ fontSize: 11, color: themeName === key ? C.text : C.muted, fontWeight: themeName === key ? 700 : 500 }}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      <button onClick={onLogout} style={{ ...primaryBtn, background: C.panel2, border: `1px solid ${C.line}`, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}><LogOut size={16} /> Log out</button>

      <div style={{ marginTop: 24 }}>
        {myPosts.length === 0 ? (
          <div style={{ color: C.muted, fontSize: 13, textAlign: "center" }}>You haven't posted anything yet.</div>
        ) : (
          myPosts.map((p) => <PostCard key={p.id} post={p} currentUser={currentUser} onLike={likePost} onComment={commentPost} onDeleteComment={deleteComment} onDelete={deletePost} onOpenProfile={onOpenProfile} />)
        )}
      </div>
    </div>
  );
}

function ThreadScreen({ token, currentUser, withUser, onBack }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const [messages, setMessages] = useState(null);
  const [otherLastRead, setOtherLastRead] = useState(0);
  const [draft, setDraft] = useState("");
  const endRef = useRef(null);

  const load = async () => {
    try {
      const d = await api("/api/messages?with=" + encodeURIComponent(withUser), { token });
      setMessages(d.messages);
      setOtherLastRead(d.otherLastRead || 0);
    } catch (e) {}
  };

  useEffect(() => {
    load();
    api("/api/messages?with=" + encodeURIComponent(withUser), { method: "POST", token, body: { markRead: true } }).catch(() => {});
    const interval = setInterval(load, 4000); // simple polling so new messages show up without a manual refresh
    return () => clearInterval(interval);
  }, [withUser]);

  useEffect(() => { if (endRef.current) endRef.current.scrollIntoView({ block: "end" }); }, [messages && messages.length]);

  const send = async () => {
    if (!draft.trim()) return;
    const text = draft.trim();
    setDraft("");
    try {
      await api("/api/messages", { method: "POST", token, body: { to: withUser, text } });
      load();
    } catch (e) {}
  };

  let lastMineIdx = -1;
  (messages || []).forEach((m, i) => { if (m.sender === currentUser) lastMineIdx = i; });

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", borderBottom: `1px solid ${C.line}` }}>
        <button onClick={onBack} style={iconBtn}><ArrowLeft size={22} color={C.text} /></button>
        <Avatar name={withUser} color={colorForName(withUser)} size={36} />
        <div style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>{withUser}</div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "14px 14px 6px", display: "flex", flexDirection: "column", gap: 8 }}>
        {messages === null && <div style={{ color: C.muted, fontSize: 13 }}>Loading...</div>}
        {(messages || []).map((m, i) => {
          const mine = m.sender === currentUser;
          const seen = mine && (m.ts || 0) <= otherLastRead;
          return (
            <div key={m.id} style={{ display: "flex", flexDirection: "column", alignItems: mine ? "flex-end" : "flex-start" }}>
              <div style={{ maxWidth: "72%", padding: "9px 13px", borderRadius: 16, borderBottomRightRadius: mine ? 4 : 16, borderBottomLeftRadius: mine ? 16 : 4, background: mine ? `linear-gradient(135deg,${C.violet},${C.coral})` : C.panel2, color: "#fff", fontSize: 13.5, lineHeight: 1.4 }}>
                {m.text}
              </div>
              {i === lastMineIdx && seen && <span style={{ fontSize: 10.5, color: C.muted, marginTop: 3 }}>Seen</span>}
            </div>
          );
        })}
        <div ref={endRef} />
      </div>

      <div style={{ display: "flex", gap: 8, padding: "10px 14px 18px", borderTop: `1px solid ${C.line}` }}>
        <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) send(); }} placeholder="Message..." style={{ ...inputStyle, flex: 1, borderRadius: 20, padding: "10px 14px" }} />
        <button onClick={send} style={{ ...iconBtn, background: C.violet, borderRadius: "50%", width: 38, height: 38, alignItems: "center", justifyContent: "center" }}><Send size={17} color="#fff" /></button>
      </div>
    </div>
  );
}

// ---------------- NAV ----------------
function BottomNav({ tab, setTab }) {
  const C = useContext(ThemeContext);
  const items = [
    { key: "feed", icon: Home }, { key: "search", icon: Search }, { key: "create", icon: PlusSquare },
    { key: "messages", icon: MessageCircle }, { key: "profile", icon: User },
  ];
  return (
    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, maxWidth: 420, margin: "0 auto", display: "flex", justifyContent: "space-around", alignItems: "center", padding: "12px 0 calc(16px + env(safe-area-inset-bottom))", background: C.panel, borderTop: `1px solid ${C.line}` }}>
      {items.map(({ key, icon: TabIcon }) => (
        <button key={key} onClick={() => setTab(key)} style={{ ...iconBtn, position: "relative", padding: 6 }}>
          <TabIcon size={22} color={tab === key ? C.coral : C.muted} />
          {tab === key && <span style={{ position: "absolute", bottom: -10, left: "50%", transform: "translateX(-50%)", width: 4, height: 4, borderRadius: "50%", background: C.coral }} />}
        </button>
      ))}
    </div>
  );
}

function useIsDesktop() {
  const detect = () => {
    if (typeof window === "undefined") return false;
    const wide = window.innerWidth >= 900;
    const mobileUA = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "");
    const coarse = typeof window.matchMedia === "function" && window.matchMedia("(pointer: coarse)").matches;
    return wide && !mobileUA && !coarse;
  };
  const [isDesktop, setIsDesktop] = useState(detect);
  useEffect(() => {
    const onResize = () => setIsDesktop(detect());
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return isDesktop;
}
function useViewportHeight() {
  const getH = () => (typeof window !== "undefined" ? window.innerHeight : 800);
  const [h, setH] = useState(getH);
  useEffect(() => {
    const update = () => setH(getH());
    window.addEventListener("resize", update);
    return () => window.removeEventListener("resize", update);
  }, []);
  return h;
}

// ---------------- APP ROOT ----------------
function Bjsenjer() {
  const [loading, setLoading] = useState(true);
  const [token, setToken] = useState(null);
  const [currentUser, setCurrentUser] = useState(null);
  const [tab, setTab] = useState("feed");
  const [messagesOpen, setMessagesOpen] = useState(false);
  const [activeThread, setActiveThread] = useState(null);
  const [viewingProfile, setViewingProfile] = useState(null);
  const [posts, setPosts] = useState([]);
  const [feedKey, setFeedKey] = useState(0);
  const [themeName, setThemeName] = useState("nightlife");
  const isDesktop = useIsDesktop();
  const viewportHeight = useViewportHeight();
  const C = THEMES[themeName] || DEFAULT_THEME;

  useEffect(() => {
    const savedTheme = localStorage.getItem("bjsenjer:theme");
    if (savedTheme && THEMES[savedTheme]) setThemeName(savedTheme);
    const savedToken = localStorage.getItem("bjsenjer:token");
    if (savedToken) {
      api("/api/me", { token: savedToken })
        .then((p) => { setToken(savedToken); setCurrentUser(p.username); })
        .catch(() => localStorage.removeItem("bjsenjer:token"))
        .finally(() => setLoading(false));
    } else {
      setLoading(false);
    }
  }, []);

  const loadFeed = async () => {
    try { const d = await api("/api/posts"); setPosts(d.posts); } catch (e) {}
  };
  useEffect(() => { if (currentUser) loadFeed(); }, [currentUser, feedKey]);

  const handleAuthed = (tok, username) => {
    localStorage.setItem("bjsenjer:token", tok);
    setToken(tok);
    setCurrentUser(username);
  };
  const handleLogout = () => {
    localStorage.removeItem("bjsenjer:token");
    setToken(null);
    setCurrentUser(null);
    setTab("feed");
    setMessagesOpen(false);
    setActiveThread(null);
    setViewingProfile(null);
  };
  const handleThemeChange = (key) => {
    setThemeName(key);
    localStorage.setItem("bjsenjer:theme", key);
  };

  const likePost = async (id) => { try { const r = await api("/api/posts?id=" + id + "&action=like", { method: "POST", token }); setPosts((prev) => prev.map((p) => (p.id === id ? r.post : p))); } catch (e) {} };
  const commentPost = async (id, text) => { try { const r = await api("/api/posts?id=" + id + "&action=comment", { method: "POST", token, body: { text } }); setPosts((prev) => prev.map((p) => (p.id === id ? r.post : p))); } catch (e) {} };
  const deleteComment = async (id, commentId) => { try { const r = await api("/api/posts?id=" + id + "&action=deleteComment", { method: "POST", token, body: { commentId } }); setPosts((prev) => prev.map((p) => (p.id === id ? r.post : p))); } catch (e) {} };
  const deletePost = async (id) => { try { await api("/api/posts?id=" + id, { method: "DELETE", token }); setPosts((prev) => prev.filter((p) => p.id !== id)); } catch (e) {} };
  const openProfile = (username) => { if (username === currentUser) { setTab("profile"); setViewingProfile(null); } else { setViewingProfile(username); } };
  const startChat = (username) => { setViewingProfile(null); setMessagesOpen(false); setActiveThread(username); };

  return (
    <ThemeContext.Provider value={C}>
      <div style={{ width: "100%", height: viewportHeight, background: C.bg, display: "flex", justifyContent: "center" }}>
        {loading ? (
          <div style={{ width: "100%", maxWidth: 420, height: "100%", display: "flex", alignItems: "center", justifyContent: "center" }}><Logo size={26} /></div>
        ) : !currentUser ? (
          <div style={{ width: "100%", height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}><AuthScreen onAuthed={handleAuthed} /></div>
        ) : activeThread ? (
          <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", fontFamily: "'Inter', sans-serif" }}>
            <ThreadScreen token={token} currentUser={currentUser} withUser={activeThread} onBack={() => setActiveThread(null)} />
          </div>
        ) : viewingProfile ? (
          <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}>
            <UserProfileScreen token={token} username={viewingProfile} currentUser={currentUser} onBack={() => setViewingProfile(null)} onMessage={startChat} />
          </div>
        ) : messagesOpen ? (
          <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}>
            <MessagesScreen token={token} onOpenThread={startChat} onBack={() => setMessagesOpen(false)} />
          </div>
        ) : (
          <div style={{ width: "100%", maxWidth: isDesktop ? 1040 : 420, height: "100%", display: "flex", fontFamily: "'Inter', sans-serif" }}>
            {isDesktop && (
              <div style={{ width: 230, flexShrink: 0, borderRight: `1px solid ${C.line}`, padding: "24px 14px", display: "flex", flexDirection: "column", height: "100%", boxSizing: "border-box" }}>
                <div style={{ marginBottom: 32, paddingLeft: 8 }}><Logo size={24} /></div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4, flex: 1 }}>
                  {[{ key: "feed", icon: Home, label: "Home" }, { key: "search", icon: Search, label: "Search" }, { key: "create", icon: PlusSquare, label: "Create" }, { key: "messages", icon: MessageCircle, label: "Messages" }, { key: "profile", icon: User, label: "Profile" }].map(({ key, icon: NavIcon, label }) => (
                    <button key={key} onClick={() => setTab(key)} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 10px", borderRadius: 10, background: tab === key ? C.panel2 : "transparent", border: "none", cursor: "pointer", textAlign: "left" }}>
                      <NavIcon size={22} color={tab === key ? C.coral : C.text} />
                      <span style={{ color: tab === key ? C.text : C.muted, fontSize: 14.5, fontWeight: tab === key ? 700 : 500, fontFamily: "'Space Grotesk', sans-serif" }}>{label}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}
            <div style={{ flex: 1, height: "100%", overflowY: "auto", position: "relative" }}>
              <div style={{ maxWidth: isDesktop ? 600 : "100%", margin: isDesktop ? "0 auto" : 0 }}>
                {tab === "feed" && <FeedScreen posts={posts} currentUser={currentUser} onLike={likePost} onComment={commentPost} onDeleteComment={deleteComment} onDelete={deletePost} onOpenProfile={openProfile} onOpenMessages={() => setMessagesOpen(true)} />}
                {tab === "search" && <SearchScreen token={token} currentUser={currentUser} onOpenProfile={openProfile} />}
                {tab === "create" && <CreateScreen token={token} onPosted={() => { setFeedKey((k) => k + 1); setTab("feed"); }} />}
                {tab === "messages" && <MessagesScreen token={token} onOpenThread={startChat} onBack={() => setTab("feed")} />}
                {tab === "profile" && <ProfileScreen token={token} currentUser={currentUser} themeName={themeName} onThemeChange={handleThemeChange} onLogout={handleLogout} onOpenProfile={openProfile} refreshKey={feedKey} />}
              </div>
              {!isDesktop && <BottomNav tab={tab} setTab={setTab} />}
            </div>
          </div>
        )}
      </div>
    </ThemeContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Bjsenjer />);
</script>
</body>
</html>
