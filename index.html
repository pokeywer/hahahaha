      )}
    </div>
  );
}

function detectIsDesktop() {
  if (typeof window === "undefined") return false;
  const wideEnough = window.innerWidth >= 900;
  const mobileUA = typeof navigator !== "undefined" && /Android|iPhone|iPad|iPod|Mobile|Windows Phone|BlackBerry|Opera Mini/i.test(navigator.userAgent || "");
  const coarsePointer = typeof window.matchMedia === "function" && window.matchMedia("(pointer: coarse)").matches;
  return wideEnough && !mobileUA && !coarsePointer;
}

function useIsDesktop() {
  const [isDesktop, setIsDesktop] = useState(detectIsDesktop);
  useEffect(() => {
    const onResize = () => setIsDesktop(detectIsDesktop());
    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", onResize);
    return () => {
      window.removeEventListener("resize", onResize);
      window.removeEventListener("orientationchange", onResize);
    };
  }, []);
  return isDesktop;
}

function useViewportHeight() {
  const getHeight = () => (typeof window !== "undefined" ? (window.visualViewport ? window.visualViewport.height : window.innerHeight) : 800);
  const [height, setHeight] = useState(getHeight);
  useEffect(() => {
    const update = () => setHeight(getHeight());
    update();
    window.addEventListener("resize", update);
    window.addEventListener("orientationchange", update);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", update);
    return () => {
      window.removeEventListener("resize", update);
      window.removeEventListener("orientationchange", update);
      if (window.visualViewport) window.visualViewport.removeEventListener("resize", update);
    };
  }, []);
  return height;
}

// ---------------- AUTH SCREEN ----------------
function AuthScreen({ accounts, onSignup, onLogin, canInstallPrompt, onInstallClick }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [showInstructions, setShowInstructions] = useState(false);

  const isIOS = typeof navigator !== "undefined" && /iPad|iPhone|iPod/.test(navigator.userAgent);

  const handleInstall = () => {
    if (canInstallPrompt) onInstallClick();
    else setShowInstructions(true);
  };

  const submit = async (e) => {
    if (e && e.preventDefault) e.preventDefault();
    const uname = username.trim();
    const pw = password.trim();
    if (!uname || !pw) {
      setError("Fill in both fields to continue.");
      return;
    }
    if (mode === "signup" && !/^[a-zA-Z0-9._-]{1,30}$/.test(uname)) {
      setError("Usernames can only use letters, numbers, dots, underscores, and hyphens.");
      return;
    }
    setError("");
    setBusy(true);
    try {
      if (mode === "signup") {
        if (accounts[uname]) {
          setError("That username is taken. Try logging in instead.");
          setBusy(false);
          return;
        }
        await onSignup(uname, pw);
      } else {
        if (!accounts[uname]) {
          setError("No account with that username yet. Sign up first.");
          setBusy(false);
          return;
        }
        if (accounts[uname] !== pw) {
          setError("Wrong password. Try again.");
          setBusy(false);
          return;
        }
        await onLogin(uname);
      }
    } catch (err) {
      setError("Error: " + (err && err.message ? err.message : String(err)));
    }
    setBusy(false);
  };

  return (
    <div style={{ minHeight: "100%", background: `radial-gradient(circle at 20% 0%, ${C.violetSoft}33, transparent 60%), ${C.bg}`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: "'Inter', sans-serif" }}>
      <div style={{ marginBottom: 20 }}>
        <Logo size={30} />
      </div>

      <button
        type="button"
        onClick={handleInstall}
        style={{
          display: "flex", alignItems: "center", gap: 7, background: C.panel2,
          border: `1px solid ${C.line}`, borderRadius: 20, padding: "7px 14px",
          color: C.text, fontSize: 12.5, fontWeight: 600, cursor: "pointer", marginBottom: 24,
        }}
      >
        <Download size={14} color={C.mint} />
        Install app
      </button>

      {showInstructions && (
        <div
          onClick={() => setShowInstructions(false)}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 20, padding: 24 }}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{ width: "100%", maxWidth: 320, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: 20 }}
          >
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, color: C.text, fontSize: 15 }}>Add to Home Screen</span>
              <button onClick={() => setShowInstructions(false)} style={iconBtn}><X size={18} color={C.muted} /></button>
            </div>
            {isIOS ? (
              <p style={{ color: C.muted, fontSize: 13, lineHeight: 1.6, margin: 0 }}>
                Tap the <Share size={13} style={{ display: "inline-flex" }} color={C.text} /> Share button in Safari, then choose <strong style={{ color: C.text }}>"Add to Home Screen."</strong>
              </p>
            ) : (
              <p style={{ color: C.muted, fontSize: 13, lineHeight: 1.6, margin: 0 }}>
                Open your browser menu (⋮) and choose <strong style={{ color: C.text }}>"Add to Home screen"</strong> or <strong style={{ color: C.text }}>"Install app."</strong> If you don't see that option, your browser may not support installing this page directly.
              </p>
            )}
          </div>
        </div>
      )}

      <div style={{ width: "100%", maxWidth: 340, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 18, padding: 24 }}>
        <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 19, margin: "0 0 4px", color: C.text }}>
          {mode === "login" ? "Welcome back" : "Create your account"}
        </h1>
        <p style={{ color: C.muted, fontSize: 13, margin: "0 0 20px" }}>
          {mode === "login" ? "Log in to see your feed and messages." : "Pick a username and password to join."}
        </p>

        <label style={{ fontSize: 12, color: C.muted, display: "block", marginBottom: 6 }}>Username</label>
        <input value={username} onChange={(e) => setUsername(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)} placeholder="yourname" style={inputStyle} autoComplete="username" />

        <label style={{ fontSize: 12, color: C.muted, display: "block", margin: "14px 0 6px" }}>Password</label>
        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit(e)} placeholder="••••••••" style={inputStyle} autoComplete={mode === "login" ? "current-password" : "new-password"} />

        {error && (
          <p style={{ color: C.coral, fontSize: 12.5, marginTop: 12, background: "#FF6F6120", padding: "8px 10px", borderRadius: 8 }}>
            {error}
          </p>
        )}

        <button type="button" onClick={submit} disabled={busy} style={{ ...primaryBtn, opacity: busy ? 0.6 : 1 }}>
          {busy ? "Please wait..." : mode === "login" ? "Log in" : "Create account"}
        </button>

        <p style={{ textAlign: "center", fontSize: 13, color: C.muted, marginTop: 18 }}>
          {mode === "login" ? "New here?" : "Already have an account?"}{" "}
          <span
            onClick={() => { setMode(mode === "login" ? "signup" : "login"); setError(""); }}
            style={{ color: C.mint, cursor: "pointer", fontWeight: 600 }}
          >
            {mode === "login" ? "Create one" : "Log in instead"}
          </span>
        </p>
      </div>
    </div>
  );
}

// ---------------- POST CARD ----------------
function PostCard({ post, avatarUrl, currentUser, onLike, onComment, onDeleteComment, onOpenProfile, onDelete, onEditPost, onHashtagClick, onMentionClick, isOwn, onToggleBookmark, isBookmarked }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const likedByMe = post.likedBy ? post.likedBy.includes(currentUser) : false;
  const likeCount = (post.baseLikes || 0) + (post.likedBy ? post.likedBy.length : 0);
  const [draft, setDraft] = useState("");
  const [showComments, setShowComments] = useState(false);
  const [videoFailed, setVideoFailed] = useState(false);
  const [videoLoaded, setVideoLoaded] = useState(false);
  const [showMenu, setShowMenu] = useState(false);
  const [editingCaption, setEditingCaption] = useState(false);
  const [captionDraft, setCaptionDraft] = useState(post.caption || "");
  const menuRef = useRef(null);

  useEffect(() => {
    if (!post.video) return;
    const t = setTimeout(() => {
      setVideoLoaded((loaded) => {
        if (!loaded) setVideoFailed(true);
        return loaded;
      });
    }, 2500);
    return () => clearTimeout(t);
  }, [post.video]);

  useEffect(() => {
    if (!showMenu) return;
    const onDocClick = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) setShowMenu(false);
    };
    document.addEventListener("mousedown", onDocClick);
    return () => document.removeEventListener("mousedown", onDocClick);
  }, [showMenu]);

  const submitComment = () => {
    if (!draft.trim()) return;
    onComment(post.id, draft.trim());
    setDraft("");
  };

  const confirmDelete = () => {
    setShowMenu(false);
    if (window.confirm("Delete this post? This can't be undone.")) onDelete(post.id);
  };

  const saveCaption = () => {
    onEditPost && onEditPost(post.id, captionDraft.trim());
    setEditingCaption(false);
  };

  const [showBigHeart, setShowBigHeart] = useState(false);
  const handleDoubleTap = () => {
    if (!likedByMe) onLike(post.id);
    setShowBigHeart(true);
    setTimeout(() => setShowBigHeart(false), 700);
  };

  const showVideo = post.video && !videoFailed;

  return (
    <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, marginBottom: 18, overflow: "hidden", boxShadow: "0 4px 18px rgba(0,0,0,0.28)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px" }}>
        <div
          style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, cursor: onOpenProfile ? "pointer" : "default" }}
          onClick={() => onOpenProfile && onOpenProfile(post.user)}
        >
          <Avatar name={post.user.name} color={post.user.color} imageUrl={avatarUrl} size={36} ring />
          <div style={{ flex: 1 }}>
            <div style={{ color: C.text, fontWeight: 600, fontSize: 13.5 }}>{post.user.name}</div>
            <div style={{ color: C.muted, fontSize: 11 }}>
              {timeAgo(post.createdAt)}{post.createdAt ? " · " : ""}{showVideo ? "Video post" : post.image ? "Photo post" : "Original post"}
            </div>
          </div>
        </div>
        <div ref={menuRef} style={{ position: "relative" }}>
          <button onClick={() => setShowMenu((s) => !s)} style={iconBtn}>
            <MoreHorizontal size={18} color={C.muted} />
          </button>
          {showMenu && (
            <div style={{ position: "absolute", top: 24, right: 0, background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, overflow: "hidden", zIndex: 5, minWidth: 130 }}>
              {isOwn ? (
                <>
                  <button onClick={() => { setShowMenu(false); setCaptionDraft(post.caption || ""); setEditingCaption(true); }} style={{ display: "block", width: "100%", padding: "10px 14px", background: "none", border: "none", color: C.text, fontSize: 13, cursor: "pointer", textAlign: "left", whiteSpace: "nowrap" }}>
                    Edit caption
                  </button>
                  <button onClick={confirmDelete} style={{ display: "block", width: "100%", padding: "10px 14px", background: "none", border: "none", color: C.coral, fontSize: 13, cursor: "pointer", textAlign: "left", whiteSpace: "nowrap" }}>
                    Delete post
                  </button>
                </>
              ) : (
                <div style={{ padding: "10px 14px", color: C.muted, fontSize: 12.5, whiteSpace: "nowrap" }}>Nothing here yet</div>
              )}
            </div>
          )}
        </div>
      </div>

      <div onDoubleClick={handleDoubleTap} style={{ position: "relative", width: "100%", aspectRatio: "1 / 1", maxHeight: "clamp(220px, 40vh, 420px)", background: "#000", overflow: "hidden" }}>
        {showVideo ? (
          <video
            key={post.video}
            src={post.video}
            poster={post.image || undefined}
            controls
            loop
            muted
            playsInline
            preload="auto"
            onLoadedData={() => setVideoLoaded(true)}
            onCanPlay={() => setVideoLoaded(true)}
            onError={() => setVideoFailed(true)}
            onStalled={() => setVideoFailed(true)}
            style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
          />
        ) : post.image ? (
          <img
            src={post.image}
            alt={post.caption}
            loading="lazy"
            style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}
          />
        ) : (
          <div style={{ height: "100%", background: post.gradient, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontFamily: "'Space Grotesk', sans-serif", color: "rgba(255,255,255,0.85)", fontSize: 13, letterSpacing: "0.08em", textTransform: "uppercase" }}>
              placeholder image
            </span>
          </div>
        )}
        {showBigHeart && (
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
            <Heart size={84} color="#fff" fill="#fff" style={{ filter: "drop-shadow(0 4px 14px rgba(0,0,0,0.5))" }} />
          </div>
        )}
      </div>
      {post.credit && (
        <div style={{ padding: "6px 14px 0", color: C.muted, fontSize: 10.5 }}>{post.credit}</div>
      )}

      <div style={{ padding: "12px 14px" }}>
        <div style={{ display: "flex", gap: 16, marginBottom: 10 }}>
          <button onClick={() => onLike(post.id)} style={iconBtn}>
            <Heart size={22} color={likedByMe ? C.coral : C.text} fill={likedByMe ? C.coral : "none"} />
          </button>
          <button onClick={() => setShowComments((s) => !s)} style={iconBtn}>
            <MessageSquare size={22} color={C.text} />
          </button>
          <Send size={20} color={C.text} style={{ marginTop: 1 }} />
          <div style={{ flex: 1 }} />
          <button onClick={() => onToggleBookmark && onToggleBookmark(post.id)} style={iconBtn}>
            <Bookmark size={20} color={isBookmarked ? C.violet : C.text} fill={isBookmarked ? C.violet : "none"} />
          </button>
        </div>

        <div style={{ color: C.text, fontSize: 13.5, fontWeight: 700, marginBottom: 4 }}>{likeCount} likes</div>
        {editingCaption ? (
          <div style={{ marginBottom: 10 }}>
            <textarea
              value={captionDraft}
              onChange={(e) => setCaptionDraft(e.target.value)}
              rows={3}
              style={{ ...inputStyle, resize: "none", marginBottom: 8, fontSize: 13 }}
              autoFocus
            />
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={saveCaption} style={{ ...primaryBtn, width: "auto", marginTop: 0, padding: "6px 14px", fontSize: 12.5 }}>Save</button>
              <button onClick={() => setEditingCaption(false)} style={{ background: "none", border: `1px solid ${C.line}`, color: C.muted, borderRadius: 10, padding: "6px 14px", fontSize: 12.5, cursor: "pointer" }}>Cancel</button>
            </div>
          </div>
        ) : (
          <div style={{ color: C.text, fontSize: 13.5, marginBottom: showComments ? 10 : 0 }}>
            <span style={{ fontWeight: 700 }}>{post.user.name}</span> {renderRichText(post.caption, C, onHashtagClick, onMentionClick)}
          </div>
        )}

        {showComments && (
          <div style={{ borderTop: `1px solid ${C.line}`, paddingTop: 10 }}>
            {post.comments.length === 0 && <div style={{ color: C.muted, fontSize: 12.5, marginBottom: 8 }}>No comments yet — say something.</div>}
            {post.comments.map((c, i) => (
              <div key={c.id || i} style={{ fontSize: 13, color: C.text, marginBottom: 6, display: "flex", alignItems: "flex-start", gap: 6 }}>
                <div style={{ flex: 1 }}><span style={{ fontWeight: 700 }}>{c.user}</span> {renderRichText(c.text, C, onHashtagClick, onMentionClick)}</div>
                {c.user === currentUser && onDeleteComment && (
                  <button onClick={() => onDeleteComment(post.id, c.id != null ? c.id : i)} style={{ ...iconBtn, flexShrink: 0 }}>
                    <X size={12} color={C.muted} />
                  </button>
                )}
              </div>
            ))}
            <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
              <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) submitComment(); }} placeholder="Add a comment..." style={{ ...inputStyle, flex: 1, padding: "8px 10px", fontSize: 12.5 }} />
              <button onClick={submitComment} style={{ ...primaryBtn, width: "auto", marginTop: 0, padding: "0 14px", fontSize: 12.5 }}>Post</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

              key={i}

    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", paddingTop: "calc(14px + env(safe-area-inset-top))", borderBottom: `1px solid ${C.line}` }}>

                  {last ? (last.from === "me" ? "You: " : "") + last.text : "Say hello 👋"}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---------------- CHAT THREAD ----------------
function ThreadScreen({ convo, onBack, onSend, onDeleteMessage }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const [draft, setDraft] = useState("");
  const endRef = useRef(null);

  useEffect(() => {
    if (endRef.current) endRef.current.scrollIntoView({ block: "end" });
  }, [convo && convo.messages.length]);

  if (!convo) {
    return (
      <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, padding: 24 }}>
        <span style={{ color: C.muted, fontSize: 13 }}>This conversation couldn't be found.</span>
        <button onClick={onBack} style={{ ...primaryBtn, width: "auto", padding: "10px 20px" }}>Back to Messages</button>
      </div>
    );
  }

  const send = () => {
    if (!draft.trim()) return;
    onSend(convo.id, draft.trim());
    setDraft("");
  };

  let lastMineIdx = -1;
  convo.messages.forEach((m, i) => { if (m.from === "me") lastMineIdx = i; });

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", paddingTop: "calc(12px + env(safe-area-inset-top))", borderBottom: `1px solid ${C.line}` }}>
        <button onClick={onBack} style={iconBtn}><ArrowLeft size={22} color={C.text} /></button>
        <Avatar name={convo.user.name} color={convo.user.color} size={36} online={convo.user.online} />
        <div>
          <div style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>{convo.user.name}</div>
          <div style={{ color: convo.user.online ? C.mint : C.muted, fontSize: 11 }}>{convo.user.online ? "Active now" : "Offline"}</div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "14px 14px 6px", display: "flex", flexDirection: "column", gap: 8 }}>
        {convo.messages.map((m, i) => (
          <div key={m.id || i} style={{ display: "flex", flexDirection: "column", alignItems: m.from === "me" ? "flex-end" : "flex-start" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              {m.from === "me" && onDeleteMessage && (
                <button
                  onClick={() => onDeleteMessage(convo.id, m.id)}
                  style={{ ...iconBtn, flexShrink: 0 }}
                  aria-label="Delete message"
                >
                  <X size={12} color={C.muted} />
                </button>
              )}
              <div style={{ maxWidth: "72%", padding: "9px 13px", borderRadius: 16, borderBottomRightRadius: m.from === "me" ? 4 : 16, borderBottomLeftRadius: m.from === "me" ? 16 : 4, background: m.from === "me" ? `linear-gradient(135deg,${C.violet},${C.coral})` : C.panel2, color: "#fff", fontSize: 13.5, lineHeight: 1.4 }}>
                {m.text}
              </div>
            </div>
            {i === lastMineIdx && m.seen && (
              <span style={{ fontSize: 10.5, color: C.muted, marginTop: 3, marginRight: 2 }}>Seen</span>
            )}
          </div>
        ))}
        <div ref={endRef} />
      </div>

      <div style={{ display: "flex", gap: 8, padding: "10px 14px 18px", borderTop: `1px solid ${C.line}` }}>
        <input
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) send(); }}
          placeholder="Message..."
          style={{ ...inputStyle, flex: 1, borderRadius: 20, padding: "10px 14px" }}
        />
        <button onClick={send} style={{ ...iconBtn, background: C.violet, borderRadius: "50%", width: 38, height: 38, alignItems: "center", justifyContent: "center" }}>
          <Send size={17} color="#fff" />
        </button>
      </div>
    </div>
  );
}

// ---------------- PROFILE ----------------
function ProfileScreen({ currentUser, avatarUrl, avatars, onAvatarChange, onLogout, posts, toggleLike, addComment, onDeleteComment, onDeletePost, onEditPost, onOpenProfile, onHashtagClick, onMentionClick, themeName, onThemeChange, bio, onBioChange, followerCount, followingCount, bookmarks, onToggleBookmark }) {
  const C = useContext(ThemeContext);
  const primaryBtn = primaryBtnFor(C);
  const inputStyle = inputStyleFor(C);
  const fileRef = useRef(null);
  const [uploading, setUploading] = useState(false);
  const [error, setError] = useState("");
  const [editingBio, setEditingBio] = useState(false);
  const [bioDraft, setBioDraft] = useState(bio || "");
  const [view, setView] = useState("posts");
  const ownPosts = posts.filter((p) => p.user.name === currentUser);
  const savedPosts = posts.filter((p) => bookmarks && bookmarks.includes(p.id));

  const pickFile = () => fileRef.current && fileRef.current.click();

  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    if (!file.type.startsWith("image/")) {
      setError("Please choose an image file.");
      return;
    }
    setError("");
    setUploading(true);
    const reader = new FileReader();
    reader.onload = () => {
      const img = new window.Image();
      img.onload = () => {
        const size = 300;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        const scale = Math.max(size / img.width, size / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        onAvatarChange(dataUrl);
        setUploading(false);
      };
      img.onerror = () => { setError("Couldn't read that image."); setUploading(false); };
      img.src = reader.result;
    };
    reader.onerror = () => { setError("Couldn't read that file."); setUploading(false); };
    reader.readAsDataURL(file);
  };

  const saveBio = () => {
    onBioChange(bioDraft.trim());
    setEditingBio(false);
  };

  return (
    <div style={{ padding: "20px 18px 90px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 12 }}>
        <div style={{ position: "relative" }} onClick={pickFile}>
          <Avatar name={currentUser} color={C.violet} imageUrl={avatarUrl} size={72} ring />
          <div
            style={{
              position: "absolute", bottom: -2, right: -2, width: 26, height: 26, borderRadius: "50%",
              background: C.violet, display: "flex", alignItems: "center", justifyContent: "center",
              border: `2px solid ${C.bg}`, cursor: "pointer",
            }}
          >
            <Camera size={13} color="#fff" />
          </div>
        </div>
        <div>
          <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 19, color: C.text }}>{currentUser}</div>
          <div style={{ color: C.muted, fontSize: 12.5, marginTop: 2 }}>Bjsenjer member</div>
          <button
            onClick={pickFile}
            disabled={uploading}
            style={{ background: "none", border: "none", color: C.mint, fontSize: 12.5, fontWeight: 600, cursor: "pointer", padding: 0, marginTop: 6 }}
          >
            {uploading ? "Uploading..." : "Edit profile picture"}
          </button>
        </div>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
      </div>

      {error && <div style={{ color: C.coral, fontSize: 12, marginBottom: 12 }}>{error}</div>}

      {avatarUrl && (
        <button
          onClick={() => onAvatarChange(null)}
          style={{ background: "none", border: `1px solid ${C.line}`, color: C.muted, fontSize: 12, borderRadius: 8, padding: "6px 10px", cursor: "pointer", marginBottom: 16 }}
        >
          Remove photo
        </button>
      )}

      {editingBio ? (
        <div style={{ marginBottom: 16 }}>
          <textarea
            value={bioDraft}
            onChange={(e) => setBioDraft(e.target.value.slice(0, 150))}
            placeholder="Write a short bio..."
            rows={3}
            style={{ ...inputStyle, resize: "none", marginBottom: 8 }}
          />
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={saveBio} style={{ ...primaryBtn, marginTop: 0, width: "auto", padding: "8px 16px", fontSize: 12.5 }}>Save</button>
            <button onClick={() => { setEditingBio(false); setBioDraft(bio || ""); }} style={{ background: "none", border: `1px solid ${C.line}`, color: C.muted, fontSize: 12.5, borderRadius: 8, padding: "8px 16px", cursor: "pointer" }}>Cancel</button>
          </div>
        </div>
      ) : (
        <div style={{ marginBottom: 16 }}>
          {bio ? (
            <div style={{ color: C.text, fontSize: 13.5, lineHeight: 1.5, marginBottom: 6 }}>{bio}</div>
          ) : (
            <div style={{ color: C.muted, fontSize: 13, marginBottom: 6, fontStyle: "italic" }}>No bio yet.</div>
          )}
          <button onClick={() => setEditingBio(true)} style={{ background: "none", border: "none", color: C.mint, fontSize: 12.5, fontWeight: 600, cursor: "pointer", padding: 0 }}>
            {bio ? "Edit bio" : "Add a bio"}
          </button>
        </div>
      )}

      <div style={{ display: "flex", gap: 24, padding: "14px 0", borderTop: `1px solid ${C.line}`, borderBottom: `1px solid ${C.line}`, marginBottom: 20 }}>
        {[["Posts", ownPosts.length], ["Followers", followerCount], ["Following", followingCount]].map(([label, val]) => (
          <div key={label}>
            <div style={{ color: C.text, fontWeight: 700, fontSize: 16 }}>{val}</div>
            <div style={{ color: C.muted, fontSize: 11.5 }}>{label}</div>
          </div>
        ))}
      </div>

      <div style={{ marginBottom: 20 }}>
        <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 14, color: C.text, marginBottom: 10 }}>Appearance</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          {Object.entries(THEMES).map(([key, t]) => {
            const active = themeName === key;
            return (
              <button
                key={key}
                onClick={() => onThemeChange(key)}
                style={{
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 6, background: "none",
                  border: `2px solid ${active ? C.violet : "transparent"}`, borderRadius: 12, padding: 6, cursor: "pointer",
                }}
              >
                <div style={{ width: 52, height: 52, borderRadius: 8, overflow: "hidden", display: "flex" }}>
                  {t.swatch.map((sw, i) => (
                    <div key={i} style={{ flex: 1, background: sw }} />
                  ))}
                </div>
                <span style={{ fontSize: 11, color: active ? C.text : C.muted, fontWeight: active ? 700 : 500 }}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>

      <button onClick={onLogout} style={{ ...primaryBtn, background: C.panel2, border: `1px solid ${C.line}`, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
        <LogOut size={16} /> Log out
      </button>

      <div style={{ display: "flex", gap: 8, marginTop: 26, borderBottom: `1px solid ${C.line}` }}>
        {[["posts", "Posts"], ["saved", "Saved"]].map(([key, label]) => (
          <button
            key={key}
            onClick={() => setView(key)}
            style={{
              flex: 1, background: "none", border: "none", cursor: "pointer", padding: "10px 0",
              color: view === key ? C.text : C.muted, fontWeight: view === key ? 700 : 500, fontSize: 13,
              borderBottom: view === key ? `2px solid ${C.violet}` : "2px solid transparent",
            }}
          >
            {label}
          </button>
        ))}
      </div>

      <div style={{ marginTop: 16 }}>
        {view === "posts" ? (
          ownPosts.length === 0 ? (
            <div style={{ color: C.muted, fontSize: 13, textAlign: "center" }}>You haven't posted anything yet.</div>
          ) : (
            ownPosts.map((p) => (
              <PostCard
                key={p.id} post={p} avatarUrl={avatarUrl} currentUser={currentUser}
                onLike={toggleLike} onComment={addComment} onDeleteComment={onDeleteComment} onOpenProfile={onOpenProfile}
                onDelete={onDeletePost} onEditPost={onEditPost} onHashtagClick={onHashtagClick} onMentionClick={onMentionClick} isOwn={true}
                onToggleBookmark={onToggleBookmark} isBookmarked={bookmarks && bookmarks.includes(p.id)}
              />
            ))
          )
        ) : savedPosts.length === 0 ? (
          <div style={{ color: C.muted, fontSize: 13, textAlign: "center" }}>Nothing saved yet — tap the bookmark icon on any post.</div>
        ) : (
          savedPosts.map((p) => (
            <PostCard
              key={p.id} post={p} avatarUrl={avatars && avatars[p.user.name]} currentUser={currentUser}
              onLike={toggleLike} onComment={addComment} onDeleteComment={onDeleteComment} onOpenProfile={onOpenProfile}
              onDelete={onDeletePost} onEditPost={onEditPost} onHashtagClick={onHashtagClick} onMentionClick={onMentionClick} isOwn={p.user.name === currentUser}
              onToggleBookmark={onToggleBookmark} isBookmarked={true}
            />
          ))
        )}
      </div>
    </div>
  );
}

// ---------------- VIEW SOMEONE ELSE'S PROFILE ----------------
function UserProfileScreen({ user, posts, avatars, currentUser, onBack, onMessage, toggleLike, addComment, onDeleteComment, onOpenProfile, onDeletePost, onEditPost, onHashtagClick, onMentionClick, bio, canFollow, isFollowing, onToggleFollow, followerCount, followingCount, bookmarks, onToggleBookmark }) {
  const C = useContext(ThemeContext);

    <div style={{ padding: "0 0 90px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", paddingTop: "calc(14px + env(safe-area-inset-top))", borderBottom: `1px solid ${C.line}` }}>
        <button onClick={onBack} style={iconBtn}><ArrowLeft size={22} color={C.text} /></button>
        <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 16, color: C.text }}>{user.name}</span>

      <div style={{ padding: "20px 18px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 14 }}>

          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 19, color: C.text }}>{user.name}</div>

            <div><span style={{ color: C.text, fontWeight: 700, fontSize: 15 }}>{followingCount}</span> <span style={{ color: C.muted, fontSize: 12.5 }}>Following</span></div>
          </div>
        )}

        <div style={{ display: "flex", gap: 10 }}>
          {canFollow && (
            <button
              onClick={() => onToggleFollow(user.name)}
              style={{
                ...primaryBtn, marginTop: 0, flex: 1,
                background: isFollowing ? C.panel2 : `linear-gradient(135deg,${C.violet},${C.coral})`,
                border: isFollowing ? `1px solid ${C.line}` : "none",
              }}
            >
              {isFollowing ? "Following" : "Follow"}
            </button>
          )}
          <button
            onClick={() => onMessage(user)}
            style={{ ...primaryBtn, marginTop: 0, flex: canFollow ? 1 : undefined, width: canFollow ? "auto" : "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: canFollow ? C.panel2 : undefined, border: canFollow ? `1px solid ${C.line}` : undefined }}
          >
            <Send size={14} /> Message
          </button>
        </div>
      </div>

      <div style={{ padding: "0 16px" }}>
        {theirPosts.length === 0 ? (
          <div style={{ color: C.muted, fontSize: 13, textAlign: "center", marginTop: 20 }}>No posts yet.</div>
        ) : (
          theirPosts.map((p) => (
            <PostCard
              key={p.id} post={p} avatarUrl={avatarUrl} currentUser={currentUser}
              onLike={toggleLike} onComment={addComment} onDeleteComment={onDeleteComment} onOpenProfile={onOpenProfile}
              onDelete={onDeletePost} onEditPost={onEditPost} onHashtagClick={onHashtagClick} onMentionClick={onMentionClick} isOwn={user.name === currentUser}
              onToggleBookmark={onToggleBookmark} isBookmarked={bookmarks && bookmarks.includes(p.id)}
            />
          ))
        )}
      </div>
    </div>
  );
}

// ---------------- REELS (TikTok-style vertical feed) ----------------
function ReelsScreen({ posts, avatars, toggleLike, addComment, onOpenProfile, onDeletePost, onHashtagClick, onMentionClick, currentUser }) {
  const C = useContext(ThemeContext);
  const [muted, setMuted] = useState(true);
  const reelPosts = posts.filter((p) => p.video || p.image || p.gradient);
  if (reelPosts.length === 0) {
    return (
      <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: C.muted, fontSize: 13 }}>
        Nothing to show yet.
      </div>
    );
  }

  return (
    <div
      style={{
        height: "100%", overflowY: "auto", scrollSnapType: "y mandatory",
        WebkitOverflowScrolling: "touch", overscrollBehaviorY: "contain", touchAction: "pan-y",
        scrollBehavior: "smooth",
      }}
    >
      {reelPosts.map((p) => (
        <ReelItem
          key={p.id}
          post={p}
          avatarUrl={avatars && avatars[p.user.name]}
          currentUser={currentUser}
          onLike={toggleLike}
          onComment={addComment}
          onOpenProfile={onOpenProfile}
          onDelete={onDeletePost}
          onHashtagClick={onHashtagClick}
          onMentionClick={onMentionClick}
          isOwn={p.user.name === currentUser}
          muted={muted}
          onToggleMute={() => setMuted((m) => !m)}
        />
      ))}
    </div>
  );
}

function ReelItem({ post, avatarUrl, currentUser, onLike, onComment, onOpenProfile, onDelete, onHashtagClick, onMentionClick, isOwn, muted, onToggleMute }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const likedByMe = post.likedBy ? post.likedBy.includes(currentUser) : false;
  const likeCount = (post.baseLikes || 0) + (post.likedBy ? post.likedBy.length : 0);
  const videoRef = useRef(null);
  const [videoFailed, setVideoFailed] = useState(false);
  const [showComments, setShowComments] = useState(false);
  const [draft, setDraft] = useState("");

  useEffect(() => {
    if (!post.video || !videoRef.current || typeof IntersectionObserver === "undefined") return;
    const el = videoRef.current;
    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) el.play().catch(() => {});
          else el.pause();
        });
      },
      { threshold: 0.6 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [post.video]);

  // Keep the video element's actual muted property in sync with state - setting the
  // muted attribute via JSX alone can silently fail to take effect after the video
  // has already started playing, so we also set it directly on the element.
  useEffect(() => {
    if (videoRef.current) videoRef.current.muted = muted;
  }, [muted]);

  const submitComment = () => {
    if (!draft.trim()) return;
    onComment(post.id, draft.trim());
    setDraft("");
  };

  const confirmDelete = () => {
    if (window.confirm("Delete this post? This can't be undone.")) onDelete(post.id);
  };

  return (
    <div
      style={{ height: "100%", width: "100%", scrollSnapAlign: "start", scrollSnapStop: "always", position: "relative", background: "#000", overflow: "hidden" }}
      onClick={() => post.video && !videoFailed && onToggleMute()}
    >
      {post.video && !videoFailed ? (
        <video
          ref={videoRef}
          src={post.video}
          loop
          muted={muted}
          playsInline
          controls={false}
          onError={() => setVideoFailed(true)}
          style={{ width: "100%", height: "100%", objectFit: "cover" }}
        />
      ) : post.image ? (
        <img src={post.image} alt={post.caption} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
      ) : (
        <div style={{ width: "100%", height: "100%", background: post.gradient }} />
      )}

      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.7), transparent 45%)", pointerEvents: "none" }} />

      {post.video && !videoFailed && (
        <div
          style={{
            position: "absolute", top: 16, right: 16, width: 34, height: 34, borderRadius: "50%",
            background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center",
          }}
        >
          {muted ? <VolumeX size={16} color="#fff" /> : <Volume2 size={16} color="#fff" />}
        </div>
      )}

      <div style={{ position: "absolute", right: 10, bottom: "calc(140px + env(safe-area-inset-bottom))", display: "flex", flexDirection: "column", alignItems: "center", gap: 22 }}>
        <button onClick={(e) => { e.stopPropagation(); onOpenProfile && onOpenProfile(post.user); }} style={iconBtn}>
          <Avatar name={post.user.name} color={post.user.color} imageUrl={avatarUrl} size={44} ring />
        </button>
        <button onClick={(e) => { e.stopPropagation(); onLike(post.id); }} style={{ ...iconBtn, flexDirection: "column", alignItems: "center", gap: 3 }}>
          <Heart size={28} color={likedByMe ? C.coral : "#fff"} fill={likedByMe ? C.coral : "none"} />
          <span style={{ color: "#fff", fontSize: 11, fontWeight: 700 }}>{likeCount}</span>
        </button>
        <button onClick={(e) => { e.stopPropagation(); setShowComments(true); }} style={{ ...iconBtn, flexDirection: "column", alignItems: "center", gap: 3 }}>
          <MessageSquare size={26} color="#fff" />
          <span style={{ color: "#fff", fontSize: 11, fontWeight: 700 }}>{post.comments.length}</span>
        </button>
        {isOwn && (
          <button onClick={(e) => { e.stopPropagation(); confirmDelete(); }} style={iconBtn}>
            <Trash size={24} color="#fff" />
          </button>
        )}
      </div>

      <div style={{ position: "absolute", left: 14, right: 74, bottom: "calc(100px + env(safe-area-inset-bottom))", color: "#fff" }}>
        <div onClick={(e) => { e.stopPropagation(); onOpenProfile && onOpenProfile(post.user); }} style={{ fontWeight: 700, fontSize: 14.5, marginBottom: 5, cursor: "pointer" }}>
          @{post.user.name}
        </div>
        {post.caption && <div style={{ fontSize: 13, lineHeight: 1.4 }}>{renderRichText(post.caption, C, onHashtagClick, onMentionClick)}</div>}
      </div>

      {showComments && (
        <div
          onClick={(e) => { e.stopPropagation(); setShowComments(false); }}
          style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "flex-end", zIndex: 10 }}
        >
          <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxHeight: "65%", background: C.panel, borderTopLeftRadius: 16, borderTopRightRadius: 16, padding: 16, display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontWeight: 700, color: C.text, fontSize: 15 }}>Comments</span>
              <button onClick={() => setShowComments(false)} style={iconBtn}><X size={18} color={C.muted} /></button>
            </div>
            <div style={{ overflowY: "auto", flex: 1, marginBottom: 10 }}>
              {post.comments.length === 0 && <div style={{ color: C.muted, fontSize: 12.5 }}>No comments yet — say something.</div>}
              {post.comments.map((c, i) => (
                <div key={i} style={{ fontSize: 13, color: C.text, marginBottom: 8 }}>
                  <span style={{ fontWeight: 700 }}>{c.user}</span> {c.text}
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={draft} onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) submitComment(); }} placeholder="Add a comment..." style={{ ...inputStyle, flex: 1 }} />
              <button onClick={submitComment} style={{ ...primaryBtn, width: "auto", marginTop: 0, padding: "0 14px" }}>Post</button>

}

function timeAgo(ts) {
  if (!ts) return "";
  const diff = Math.max(0, Date.now() - ts);
  const min = Math.floor(diff / 60000);
  if (min < 1) return "Just now";
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day < 7) return `${day}d ago`;
  const wk = Math.floor(day / 7);
  return `${wk}w ago`;
}

function colorForName(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[hash % AVATAR_COLORS.length];
}

const TAG_TOKEN_RE = /(#[a-zA-Z0-9_]+|@[a-zA-Z0-9._-]+)/g;
function extractHashtags(text) {
  return ((text || "").match(/#[a-zA-Z0-9_]+/g) || []).map((t) => t.slice(1).toLowerCase());
}
function extractMentions(text) {
  return ((text || "").match(/@[a-zA-Z0-9._-]+/g) || []).map((t) => t.slice(1));
}

// Splits caption/comment text on #hashtags and @mentions, rendering each as a tappable
// colored span. Plain text passes through untouched. onHashtag/onMention are optional -
// omit either to render that token type as plain (non-clickable) styled text.
function renderRichText(text, C, onHashtag, onMention) {
  if (!text) return null;
  const parts = text.split(TAG_TOKEN_RE);
  return parts.map((part, i) => {
    if (/^#[a-zA-Z0-9_]+$/.test(part)) {
      return (
        <span
          key={i}
          onClick={onHashtag ? (e) => { e.stopPropagation(); onHashtag(part.slice(1)); } : undefined}
          style={{ color: C.violet, fontWeight: 600, cursor: onHashtag ? "pointer" : "inherit" }}
        >
          {part}
        </span>
      );
    }
    if (/^@[a-zA-Z0-9._-]+$/.test(part)) {
      return (
        <span
          key={i}
          onClick={onMention ? (e) => { e.stopPropagation(); onMention(part.slice(1)); } : undefined}
          style={{ color: C.mint, fontWeight: 600, cursor: onMention ? "pointer" : "inherit" }}
        >
          {part}
        </span>
      );
    }
    return <React.Fragment key={i}>{part}</React.Fragment>;
  });
}

// ---------------- CREATE ----------------
const MAX_VIDEO_BYTES = 650 * 1024; // 650KB raw (~900KB once base64-encoded) - Firestore caps each post document at 1MB
const MAX_IMAGE_DATAURL_CHARS = 850 * 1024; // leaves headroom under the 1MB doc cap for caption/user/etc fields

// Encodes a loaded <img> to a JPEG data URL, shrinking quality then dimensions until it's
// safely under Firestore's per-document size limit. A photo straight off a phone camera at
// 1080px/quality-0.82 can occasionally land north of 1MB, which made posts silently fail
// to save - this makes sure every image actually fits before it's ever sent to the database.
function compressImageToDataUrl(img, maxDim, targetChars) {
  let dim = maxDim;
  let quality = 0.82;
  let dataUrl = null;
  for (let attempt = 0; attempt < 8; attempt++) {
    const scale = Math.min(1, dim / Math.max(img.width, img.height));
    const w = Math.max(1, Math.round(img.width * scale));
    const h = Math.max(1, Math.round(img.height * scale));
    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    canvas.getContext("2d").drawImage(img, 0, 0, w, h);
    dataUrl = canvas.toDataURL("image/jpeg", quality);
    if (dataUrl.length <= targetChars) return dataUrl;
    if (quality > 0.45) quality -= 0.12;
    else dim = Math.round(dim * 0.8);
  }
  return dataUrl; // best effort after 8 attempts - the Firestore write itself still error-checks this
}

// Re-encodes a video file down to a target size by drawing it to a canvas at a lower
// resolution/bitrate and recording that with MediaRecorder. Audio is dropped (canvas capture
// has no audio track) - fine here since feed videos already autoplay muted. Long clips are
// trimmed to MAX_VIDEO_SECONDS, since spreading 1MB of budget across a long video just makes
// it blurry and blocky rather than genuinely usable.
const MAX_VIDEO_SECONDS = 8;
const VIDEO_COMPRESS_SUPPORTED =
  typeof window !== "undefined" &&
  typeof window.MediaRecorder !== "undefined" &&
  typeof HTMLCanvasElement !== "undefined" &&
  !!HTMLCanvasElement.prototype.captureStream;

function pickVideoMimeType() {
  const candidates = ["video/webm;codecs=vp9", "video/webm;codecs=vp8", "video/webm"];
  for (const type of candidates) {
    if (window.MediaRecorder.isTypeSupported(type)) return type;
  }
  return "";
}

function compressVideoFile(file, targetBytes, maxDim) {
  return new Promise((resolve, reject) => {
    if (!VIDEO_COMPRESS_SUPPORTED) {
      reject(new Error("This browser can't compress video automatically."));
      return;
    }
    const mimeType = pickVideoMimeType();
    if (!mimeType) {
      reject(new Error("This browser can't compress video automatically."));
      return;
    }
    const videoEl = document.createElement("video");
    videoEl.muted = true;
    videoEl.playsInline = true;
    videoEl.src = URL.createObjectURL(file);

    const cleanup = () => URL.revokeObjectURL(videoEl.src);

    videoEl.onloadedmetadata = () => {
      const fullDuration = videoEl.duration || MAX_VIDEO_SECONDS;
      const duration = Math.min(fullDuration, MAX_VIDEO_SECONDS);
      const scale = Math.min(1, maxDim / Math.max(videoEl.videoWidth || maxDim, videoEl.videoHeight || maxDim));
      const w = Math.max(2, Math.round((videoEl.videoWidth || maxDim) * scale));
      const h = Math.max(2, Math.round((videoEl.videoHeight || maxDim) * scale));
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      // Leave ~15% headroom below the byte target for container/keyframe overhead -
      // MediaRecorder's bitrate is a target, not a hard cap.
      const bitrate = Math.max(150000, Math.min(2500000, Math.floor((targetBytes * 8 * 0.85) / duration)));
      const stream = canvas.captureStream(24);
      let recorder;
      try {
        recorder = new window.MediaRecorder(stream, { mimeType, videoBitsPerSecond: bitrate });
      } catch (e) {
        cleanup();
        reject(e);
        return;
      }
      const chunks = [];
      recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
      recorder.onerror = (e) => { cleanup(); reject((e && e.error) || new Error("Recording failed")); };
      recorder.onstop = () => {
        cleanup();
        resolve({ blob: new Blob(chunks, { type: mimeType }), trimmed: fullDuration > MAX_VIDEO_SECONDS + 0.25 });
      };

      let drawing = true;
      const drawFrame = () => {
        if (!drawing) return;
        ctx.drawImage(videoEl, 0, 0, w, h);
        requestAnimationFrame(drawFrame);
      };

      videoEl.onseeked = () => {
        videoEl.play().then(() => {
          recorder.start();
          drawFrame();
          setTimeout(() => {
            drawing = false;
            videoEl.pause();
            if (recorder.state !== "inactive") recorder.stop();
          }, Math.round(duration * 1000));
        }).catch((err) => { cleanup(); reject(err); });
      };
      videoEl.currentTime = 0;
    };
    videoEl.onerror = () => { cleanup(); reject(new Error("Couldn't read that video.")); };
  });
}

function blobToDataUrl(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Couldn't read that file."));
    reader.readAsDataURL(blob);
  });
}

function CreateScreen({ onPost }) {
  const C = useContext(ThemeContext);
  const inputStyle = inputStyleFor(C);
  const primaryBtn = primaryBtnFor(C);
  const [caption, setCaption] = useState("");
  const [gradient] = useState(GRADIENTS[Math.floor(Math.random() * GRADIENTS.length)]);
  const [mediaType, setMediaType] = useState(null); // "image" | "video" | null
  const [mediaUrl, setMediaUrl] = useState(null);
  const [error, setError] = useState("");
  const [processing, setProcessing] = useState(false);
  const [compressNote, setCompressNote] = useState("");
  const [notice, setNotice] = useState("");
  const fileRef = useRef(null);

  const pickFile = () => fileRef.current && fileRef.current.click();

  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setError("");
    setNotice("");

    if (file.type.startsWith("image/")) {
      setProcessing(true);
      const reader = new FileReader();
      reader.onload = () => {
        const img = new window.Image();
        img.onload = () => {
          setMediaUrl(compressImageToDataUrl(img, 1080, MAX_IMAGE_DATAURL_CHARS));
          setMediaType("image");
          setProcessing(false);
        };
        img.onerror = () => { setError("Couldn't read that image."); setProcessing(false); };
        img.src = reader.result;
      };
      reader.onerror = () => { setError("Couldn't read that file."); setProcessing(false); };
      reader.readAsDataURL(file);
    } else if (file.type.startsWith("video/")) {
      if (file.size <= MAX_VIDEO_BYTES) {
        // Already small enough - use it as-is, no need to re-encode and lose quality.
        setProcessing(true);
        blobToDataUrl(file)
          .then((dataUrl) => { setMediaUrl(dataUrl); setMediaType("video"); })
          .catch(() => setError("Couldn't read that file."))
          .finally(() => setProcessing(false));
        return;
      }
      if (!VIDEO_COMPRESS_SUPPORTED) {
        setError(`That video is too big (${(file.size / (1024 * 1024)).toFixed(1)}MB) and this browser can't auto-compress it. Try a shorter/lower-res clip, or share it as a photo instead.`);
        return;
      }
      setProcessing(true);
      setCompressNote("Compressing video…");
      compressVideoFile(file, MAX_VIDEO_BYTES, 480)
        .then(async ({ blob, trimmed }) => {
          if (blob.size > MAX_IMAGE_DATAURL_CHARS * 0.73) {
            // Still too big even after compression (very long/complex clip) - one more,
            // more aggressive pass at a smaller size/lower bitrate before giving up.
            const retry = await compressVideoFile(file, MAX_VIDEO_BYTES * 0.7, 360);
            return { blob: retry.blob, trimmed: trimmed || retry.trimmed };
          }
          return { blob, trimmed };
        })
        .then(async ({ blob, trimmed }) => {
          const dataUrl = await blobToDataUrl(blob);
          if (dataUrl.length > MAX_IMAGE_DATAURL_CHARS) {
            throw new Error("Even compressed, that video is still too large. Try a shorter clip.");
          }
          setMediaUrl(dataUrl);
          setMediaType("video");
          if (trimmed) {
            setNotice(`Video trimmed to the first ${MAX_VIDEO_SECONDS} seconds and compressed to fit the size limit.`);
          }
        })
        .catch((err) => {
          setError("Couldn't compress that video: " + (err && err.message ? err.message : "please try a shorter/smaller clip") + ".");
        })
        .finally(() => { setProcessing(false); setCompressNote(""); });
    } else {
      setError("Please choose an image or video file.");
    }
  };

  const clearMedia = () => { setMediaUrl(null); setMediaType(null); setNotice(""); };

  const [submitting, setSubmitting] = useState(false);

  const submit = async () => {
    if (!caption.trim() && !mediaUrl) return;
    setError("");
    setSubmitting(true);
    try {
      await onPost({
        caption: caption.trim(),
        image: mediaType === "image" ? mediaUrl : null,
        video: mediaType === "video" ? mediaUrl : null,
        gradient,
      });
      setCaption("");
      clearMedia();
    } catch (err) {
      setError(
        "Couldn't save your post — " +
        (err && err.message ? err.message : "please try again") +
        ". Your caption and photo/video are still here, nothing was lost."
      );
    }
    setSubmitting(false);
  };

  return (
    <div style={{ padding: "16px 16px 90px" }}>
      <div
        onClick={!mediaUrl ? pickFile : undefined}
        style={{ height: 260, borderRadius: 16, overflow: "hidden", marginBottom: 12, position: "relative", cursor: !mediaUrl ? "pointer" : "default", background: mediaUrl ? "#000" : gradient, display: "flex", alignItems: "center", justifyContent: "center" }}
      >
        {processing ? (
          <span style={{ color: "#fff", fontSize: 13, fontFamily: "'Space Grotesk', sans-serif", padding: "0 16px", textAlign: "center" }}>{compressNote || "Processing..."}</span>
        ) : mediaType === "image" ? (
          <img src={mediaUrl} alt="Your upload" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        ) : mediaType === "video" ? (
          <video src={mediaUrl} controls loop muted playsInline style={{ width: "100%", height: "100%", objectFit: "cover" }} />
        ) : (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
            <ImageIcon size={30} color="rgba(255,255,255,0.85)" />
            <span style={{ color: "rgba(255,255,255,0.85)", fontSize: 12.5, fontFamily: "'Space Grotesk', sans-serif" }}>Tap to add a photo or video</span>
          </div>
        )}
        {mediaUrl && (
          <button
            onClick={(e) => { e.stopPropagation(); clearMedia(); }}
            style={{ position: "absolute", top: 10, right: 10, width: 28, height: 28, borderRadius: "50%", background: "rgba(0,0,0,0.55)", border: "none", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}
          >
            <X size={14} color="#fff" />
          </button>
        )}
      </div>
      <input ref={fileRef} type="file" accept="image/*,video/*" onChange={handleFile} style={{ display: "none" }} />

      {!mediaUrl && (
        <button type="button" onClick={pickFile} style={{ ...primaryBtn, marginTop: 0, marginBottom: 14, background: C.panel2, border: `1px solid ${C.line}` }}>
          Choose photo or video
        </button>
      )}

      {error && (
        <p style={{ color: C.coral, fontSize: 12.5, marginBottom: 12, background: "#FF6F6120", padding: "8px 10px", borderRadius: 8 }}>{error}</p>
      )}
      {notice && !error && (
        <p style={{ color: C.mint, fontSize: 12.5, marginBottom: 12, background: "#33D6A620", padding: "8px 10px", borderRadius: 8 }}>{notice}</p>
      )}

      <textarea value={caption} onChange={(e) => setCaption(e.target.value)} placeholder="Write a caption... #hashtags and @mentions work" rows={4} style={{ ...inputStyle, resize: "none", marginBottom: 14 }} />
      <button onClick={submit} disabled={submitting || processing} style={{ ...primaryBtn, opacity: submitting || processing ? 0.6 : 1 }}>
        {submitting ? "Sharing..." : "Share to feed"}
      </button>
    </div>
  );
}

// ---------------- APP ROOT ----------------
// Only login session + theme are device-local (you should stay logged in / keep your
// theme on THIS device without needing the network). Everything else - accounts, posts,
// DMs, avatars, bios, follows, bookmarks - lives in Firestore below so it's shared across
// every device, not just the browser that created it.
const STORAGE_KEYS = { session: "bjsenjer:session", theme: "bjsenjer:theme" };
const dmIdFor = (a, b) => "dm:" + [a, b].sort().join("::");

function storageGet(key, fallback) {
  try {
    const raw = window.localStorage.getItem(key);
    return raw === null ? fallback : JSON.parse(raw);
  } catch (e) {
    return fallback;
  }
}
function storageSet(key, value) {
  try {
    window.localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch (e) {
    // storage unavailable or quota exceeded - app still works for this session
    return false;
  }
}
