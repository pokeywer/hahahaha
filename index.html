function emptyProfile() {
  return { avatar: null, bio: "", bookmarks: [], lastSeenMessagesAt: 0, lastSeenActivityCount: 0, personalConvos: seedConvos };
}

function Bjsenjer() {
  const [loading, setLoading] = useState(true);
  const [slowLoad, setSlowLoad] = useState(false);
  const [accounts, setAccounts] = useState({});
  const [currentUser, setCurrentUser] = useState(null);
  const [tab, setTab] = useState("feed");
  const [messagesOpen, setMessagesOpen] = useState(false);
  const [activeThread, setActiveThread] = useState(null);
  const [searchPrefill, setSearchPrefill] = useState(null);
  const [viewingProfile, setViewingProfile] = useState(null);
  const [posts, setPosts] = useState([]);
  const [dms, setDms] = useState({});
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [themeName, setThemeName] = useState("nightlife");
  const [follows, setFollows] = useState({});
  // Per-user data (avatar, bio, bookmarks, last-seen markers, demo-contact chats) all lives in
  // one Firestore doc per username so it follows the account across every device.
  const [profiles, setProfiles] = useState({});

  useEffect(() => {
    const handler = (e) => {
      e.preventDefault();
      setDeferredPrompt(e);
    };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  const handleInstallClick = async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    setDeferredPrompt(null);
  };

  useEffect(() => {
    // Restore this device's remembered login + theme (these two stay local on purpose -
    // logging in again on a new device is expected, same as any other app).
    const session = storageGet(STORAGE_KEYS.session, null);
    if (session) setCurrentUser(session);
    const savedTheme = storageGet(STORAGE_KEYS.theme, "nightlife");
    if (THEMES[savedTheme]) setThemeName(savedTheme);

    if (!FIREBASE_CONFIGURED) { setLoading(false); return; }

    const slowTimer = setTimeout(() => setSlowLoad(true), 8000);

    // Only "accounts" blocks the initial loading screen - it's the one thing the login/
    // signup screen actually needs before it can work. Everything else (your profile,
    // posts, DMs, follows) streams in right behind it instead of making you wait on all
    // five collections before you see anything.
    let accountsLoaded = false;
    const markLoaded = () => {
      if (!accountsLoaded) { accountsLoaded = true; setLoading(false); }
    };

    const unsubAccounts = accountsCol.onSnapshot(
      (snap) => {
        const map = {};
        snap.forEach((d) => { map[d.id] = d.data().password; });
        setAccounts(map);
        markLoaded();
      },
      () => markLoaded()
    );

    const unsubProfiles = profilesCol.onSnapshot(
      (snap) => {
        const map = {};
        snap.forEach((d) => { map[d.id] = d.data(); });
        setProfiles(map);
      },
      () => {}
    );

    const unsubFollows = followsCol.onSnapshot(
      (snap) => {
        const map = {};
        snap.forEach((d) => { map[d.id] = d.data().following || []; });
        setFollows(map);
      },
      () => {}
    );

    const unsubDms = dmsCol.onSnapshot(
      (snap) => {
        const map = {};
        snap.forEach((d) => { map[d.id] = d.data(); });
        setDms(map);
      },
      () => {}
    );

    const unsubPosts = postsCol.orderBy("createdAt", "desc").limit(300).onSnapshot(
      async (snap) => {
        if (snap.empty && !snap.metadata.fromCache) {
          // Brand new, empty database - seed it once so everyone sees the same starter feed
          // instead of an empty app. If two devices race on this, Firestore just ends up
          // with the same 4 docs written twice with identical IDs, which is harmless.
          try {
            const batch = db.batch();
            seedPosts.forEach((p) => batch.set(postsCol.doc(p.id), p));
            await batch.commit();
          } catch (e) { /* ignore - rules may not be set up yet, or another client won the race */ }
          return;
        }
        const list = [];
        snap.forEach((d) => list.push(d.data()));
        setPosts(list);
      },
      () => {}
    );

    return () => { clearTimeout(slowTimer); unsubAccounts(); unsubProfiles(); unsubFollows(); unsubDms(); unsubPosts(); };
  }, []);

  // Derived per-user fields, always read from the live `profiles` map for currentUser -
  // there's only one source of truth per field now, so a device can't show stale data
  // just because it forgot to re-read local storage.
  const myProfile = (currentUser && profiles[currentUser]) || emptyProfile();
  const personalConvos = myProfile.personalConvos || seedConvos;
  const bookmarks = myProfile.bookmarks || [];
  const lastSeenMessagesAt = myProfile.lastSeenMessagesAt || 0;
  const lastSeenActivityCount = myProfile.lastSeenActivityCount || 0;
  const avatars = {};
  const bios = {};
  Object.keys(profiles).forEach((name) => {
    if (profiles[name] && profiles[name].avatar) avatars[name] = profiles[name].avatar;
    if (profiles[name] && profiles[name].bio) bios[name] = profiles[name].bio;
  });

  const markMessagesSeen = () => {
    if (currentUser) profilesCol.doc(currentUser).set({ lastSeenMessagesAt: Date.now() }, { merge: true });
  };

  const markActivitySeen = (count) => {
    if (currentUser) profilesCol.doc(currentUser).set({ lastSeenActivityCount: count }, { merge: true });
  };

  const handleThemeChange = (key) => {
    if (!THEMES[key]) return;
    setThemeName(key);
    storageSet(STORAGE_KEYS.theme, key);
  };

  const handleBioChange = (text) => {
    if (currentUser) profilesCol.doc(currentUser).set({ bio: text }, { merge: true });
  };

  const handleToggleBookmark = (postId) => {
    if (!currentUser) return;
    const next = bookmarks.includes(postId) ? bookmarks.filter((id) => id !== postId) : [...bookmarks, postId];
    profilesCol.doc(currentUser).set({ bookmarks: next }, { merge: true });
  };

  const handleToggleFollow = (targetName) => {
    if (!currentUser) return;
    const mine = follows[currentUser] || [];
    const nextMine = mine.includes(targetName) ? mine.filter((n) => n !== targetName) : [...mine, targetName];
    followsCol.doc(currentUser).set({ following: nextMine }, { merge: true });
  };

  const handleSignup = async (uname, pw) => {
    const batch = db.batch();
    batch.set(accountsCol.doc(uname), { password: pw });
    batch.set(profilesCol.doc(uname), emptyProfile());
    await batch.commit();
    storageSet(STORAGE_KEYS.session, uname);
    setCurrentUser(uname);
  };

  const handleLogin = async (uname) => {
    storageSet(STORAGE_KEYS.session, uname);
    setCurrentUser(uname);
    // Accounts created before profiles existed (or created elsewhere) may not have a
    // profile doc yet - make sure one exists so avatar/bio/bookmarks writes don't fail.
    if (!profiles[uname]) {
      try { await profilesCol.doc(uname).set(emptyProfile(), { merge: true }); } catch (e) {}
    }
  };

  const handleLogout = async () => {
    storageSet(STORAGE_KEYS.session, null);
    setCurrentUser(null);
    setTab("feed");
    setMessagesOpen(false);
    setActiveThread(null);
    setViewingProfile(null);
  };

  const handleOpenProfile = (user) => setViewingProfile(user);

  useEffect(() => {
    if (!activeThread) return;
    const isDm = activeThread.startsWith("dm:");
    const exists = isDm ? !!dms[activeThread] : personalConvos.some((c) => c.id === activeThread);
    if (!exists) setActiveThread(null);
  }, [activeThread, personalConvos, dms]);

  const handleAvatarChange = (dataUrlOrNull) => {
    if (!currentUser) return;
    profilesCol.doc(currentUser).set({ avatar: dataUrlOrNull || null }, { merge: true });
  };

  useEffect(() => {
    if (messagesOpen || tab === "messages" || (activeThread && activeThread.startsWith("dm:"))) {
      markMessagesSeen();
    }
    if (activeThread && activeThread.startsWith("dm:") && currentUser) {
      const convo = dms[activeThread];
      if (convo) {
        const now = Date.now();
        if (!convo.lastReadBy || convo.lastReadBy[currentUser] !== now) {
          dmsCol.doc(activeThread).update({ [`lastReadBy.${currentUser}`]: now }).catch(() => {});
        }
      }
    }
  }, [messagesOpen, tab, activeThread]);

  const toggleLike = (id) => {
    const post = posts.find((p) => p.id === id);
    if (!post) return;
    const already = (post.likedBy || []).includes(currentUser);
    postsCol.doc(id).set(
      { likedBy: already ? FieldValue.arrayRemove(currentUser) : FieldValue.arrayUnion(currentUser) },
      { merge: true }
    );
  };

  const addComment = (id, text) => {
    const comment = { id: Date.now() + "-" + Math.random().toString(36).slice(2), user: currentUser, text };
    postsCol.doc(id).set({ comments: FieldValue.arrayUnion(comment) }, { merge: true });
  };

  const handleDeleteComment = (postId, commentId) => {
    const post = posts.find((p) => p.id === postId);
    if (!post) return;
    // Only comments with an id (anything posted through the app) can be targeted for
    // atomic removal - matches the original behavior where seed comments (no id) weren't deletable.
    const target = (post.comments || []).find((c) => c.id != null && c.id === commentId);
    if (!target) return;
    postsCol.doc(postId).set({ comments: FieldValue.arrayRemove(target) }, { merge: true });
  };

  const handleDeletePost = (id) => {
    postsCol.doc(id).delete();
  };

  const handleEditPost = (id, caption) => {
    postsCol.doc(id).set({ caption }, { merge: true });
  };

  const openHashtagSearch = (tag) => {
    setSearchPrefill({ q: "#" + tag, ts: Date.now() });
    setViewingProfile(null);
    setActiveThread(null);
    setTab("search");
  };

  const openMentionedProfile = (name) => {
    if (accounts[name]) {
      handleOpenProfile({ name, color: colorForName(name), imageUrl: avatars[name] });
      return;
    }
    const seedMatch = seedUsers.find((u) => u.name === name);
    if (seedMatch) handleOpenProfile(seedMatch);
    // Unknown name (typo, or someone who never signed up) - nothing to navigate to.
  };

  const handlePost = async ({ caption, image, video, gradient }) => {
    const id = "p" + Date.now();
    const newPost = { id, user: { name: currentUser, color: C.violet }, caption, image: image || null, video: video || null, gradient, createdAt: Date.now(), baseLikes: 0, likedBy: [], comments: [] };
    await postsCol.doc(id).set(newPost);
    setTab("feed");
  };

  const handleStartChat = (user) => {
    setViewingProfile(null);
    const isRealAccount = !!accounts[user.name];
    if (isRealAccount) {
      const id = dmIdFor(currentUser, user.name);
      if (!dms[id]) {
        dmsCol.doc(id).set({ id, participants: [currentUser, user.name], messages: [], lastReadBy: {} });
      }
      setActiveThread(id);
    } else if (currentUser) {
      const existing = personalConvos.find((c) => c.user.name === user.name);
      if (existing) {
        setActiveThread(existing.id);
      } else {
        const id = "chat-" + user.name;
        const next = [...personalConvos, { id, user, messages: [], lastActivity: Date.now() }];
        profilesCol.doc(currentUser).set({ personalConvos: next }, { merge: true });
        setActiveThread(id);
      }
    }
  };

  const handleSend = (convoId, text) => {
    if (convoId.startsWith("dm:")) {
      if (!dms[convoId]) return;
      const msg = { id: Date.now() + "-" + Math.random().toString(36).slice(2), sender: currentUser, text, ts: Date.now() };
      dmsCol.doc(convoId).set({ messages: FieldValue.arrayUnion(msg) }, { merge: true });
    } else if (currentUser) {
      const next = personalConvos.map((c) =>
        c.id === convoId
          ? { ...c, messages: [...c.messages, { id: Date.now() + "-" + Math.random().toString(36).slice(2), from: "me", text }], lastActivity: Date.now() }
          : c
      );
      profilesCol.doc(currentUser).set({ personalConvos: next }, { merge: true });
    }
  };

  // Only your own messages can be deleted - for DMs this uses arrayRemove targeting the
  // exact message object, so it can't accidentally drop a message the other person just sent.
  const handleDeleteMessage = (convoId, messageId) => {
    if (convoId.startsWith("dm:")) {
      const convo = dms[convoId];
      if (!convo) return;
      const target = (convo.messages || []).find((m) => m.id === messageId && m.sender === currentUser);
      if (!target) return;
      dmsCol.doc(convoId).set({ messages: FieldValue.arrayRemove(target) }, { merge: true });
    } else if (currentUser) {
      const next = personalConvos.map((c) =>
        c.id === convoId ? { ...c, messages: c.messages.filter((m) => !(m.id === messageId && m.from === "me")) } : c
      );
      profilesCol.doc(currentUser).set({ personalConvos: next }, { merge: true });
    }
  };

  // Combine the account's private demo-contact chats with any real shared DMs it's part of
  const dmList = Object.values(dms)
    .filter((d) => d.participants.includes(currentUser))
    .map((d) => {
      const otherName = d.participants.find((n) => n !== currentUser) || d.participants[0];
      const last = d.messages[d.messages.length - 1];
      const otherLastRead = (d.lastReadBy && d.lastReadBy[otherName]) || 0;
      return {
        id: d.id,
        user: { name: otherName, color: colorForName(otherName), imageUrl: avatars[otherName], online: true, real: true },
        messages: d.messages.map((m) => ({
          id: m.id, from: m.sender === currentUser ? "me" : "them", text: m.text,
          seen: m.sender === currentUser && (m.ts || 0) <= otherLastRead,
        })),
        lastActivity: last ? last.ts : 0,
      };
    });
  const messagesList = [...personalConvos, ...dmList];
  const activeConvo = messagesList.find((c) => c.id === activeThread) || null;
  const hasUnread = dmList.some((c) => {
    const last = c.messages[c.messages.length - 1];
    return last && last.from === "them" && (c.lastActivity || 0) > lastSeenMessagesAt;
  });

  // Derived activity feed: likes/comments on your posts, and new followers - computed
  // live from existing data rather than a separate persisted notification log.
  const activityItems = [];
  posts.filter((p) => p.user.name === currentUser).forEach((p) => {
    (p.likedBy || []).forEach((name) => {
      if (name === currentUser) return;
      activityItems.push({ type: "like", user: { name, color: colorForName(name), imageUrl: avatars[name] }, text: "liked your post" });
    });
    (p.comments || []).forEach((c) => {
      if (c.user === currentUser) return;
      activityItems.push({ type: "comment", user: { name: c.user, color: colorForName(c.user), imageUrl: avatars[c.user] }, text: `commented: "${c.text}"` });
    });
  });
  posts.forEach((p) => {
    if (p.user.name !== currentUser && extractMentions(p.caption).includes(currentUser)) {
      activityItems.push({ type: "mention", user: { name: p.user.name, color: colorForName(p.user.name), imageUrl: avatars[p.user.name] }, text: "mentioned you in a post" });
    }
    (p.comments || []).forEach((c) => {
      if (c.user !== currentUser && extractMentions(c.text).includes(currentUser)) {
        activityItems.push({ type: "mention", user: { name: c.user, color: colorForName(c.user), imageUrl: avatars[c.user] }, text: `mentioned you in a comment: "${c.text}"` });
      }
    });
  });
  Object.entries(follows).forEach(([followerName, list]) => {
    if (followerName !== currentUser && list.includes(currentUser)) {
      activityItems.push({ type: "follow", user: { name: followerName, color: colorForName(followerName), imageUrl: avatars[followerName] }, text: "started following you" });
    }
  });
  const hasNewActivity = activityItems.length > lastSeenActivityCount;

  useEffect(() => {
    if (tab === "activity") markActivitySeen(activityItems.length);
  }, [tab, activityItems.length]);

  const followingList = follows[currentUser] || [];
  const followerCountFor = (name) => Object.entries(follows).filter(([n, list]) => n !== name && list.includes(name)).length;
  const followingCountFor = (name) => (follows[name] || []).length;

  const isDesktop = useIsDesktop();
  const C = THEMES[themeName] || DEFAULT_THEME;

  return (
    <ThemeContext.Provider value={C}>
    <div style={{ width: "100%", height: "100%", background: C.bg, display: "flex", justifyContent: "center" }}>
      {!FIREBASE_CONFIGURED ? (
        <div style={{ width: "100%", height: "100%", overflowY: "auto" }}>
          <SetupNeededScreen />
        </div>
      ) : loading ? (
        <div style={{ width: "100%", maxWidth: 420, height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14, padding: 24, textAlign: "center" }}>
          <Logo size={26} />
          {slowLoad && (
            <p style={{ color: C.muted, fontSize: 12.5, lineHeight: 1.6, fontFamily: "'Inter', sans-serif" }}>
              This is taking longer than it should. If it doesn't finish, double-check your Firestore security rules in the Firebase console allow read/write access - a locked-down default ruleset is the most common cause of a stuck load.
            </p>
          )}
        </div>
      ) : !currentUser ? (
        <div style={{ width: "100%", height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}>
          <AuthScreen accounts={accounts} onSignup={handleSignup} onLogin={handleLogin} canInstallPrompt={!!deferredPrompt} onInstallClick={handleInstallClick} />
        </div>
      ) : activeThread ? (
        <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", fontFamily: "'Inter', sans-serif" }}>
          <ThreadScreen convo={activeConvo} onBack={() => setActiveThread(null)} onSend={handleSend} onDeleteMessage={handleDeleteMessage} />
        </div>
      ) : viewingProfile ? (
        <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}>
          <UserProfileScreen
            user={viewingProfile}
            posts={posts}
            avatars={avatars}
            currentUser={currentUser}
            onBack={() => setViewingProfile(null)}
            onMessage={handleStartChat}
            toggleLike={toggleLike}
            addComment={addComment}
            onDeleteComment={handleDeleteComment}
            onOpenProfile={handleOpenProfile}
            onDeletePost={handleDeletePost}
            onEditPost={handleEditPost}
            onHashtagClick={openHashtagSearch}
            onMentionClick={openMentionedProfile}
            bio={bios[viewingProfile.name]}
            canFollow={!!accounts[viewingProfile.name]}
            isFollowing={followingList.includes(viewingProfile.name)}
            onToggleFollow={handleToggleFollow}
            followerCount={followerCountFor(viewingProfile.name)}
            followingCount={followingCountFor(viewingProfile.name)}
            bookmarks={bookmarks}
            onToggleBookmark={handleToggleBookmark}
          />
        </div>
      ) : messagesOpen ? (
        <div style={{ width: "100%", maxWidth: isDesktop ? 640 : 420, height: "100%", overflowY: "auto", fontFamily: "'Inter', sans-serif" }}>
          <MessagesScreen convos={messagesList} onOpenThread={(id) => setActiveThread(id)} onBack={() => setMessagesOpen(false)} />
        </div>
      ) : (
        <div style={{ width: "100%", maxWidth: isDesktop ? 1040 : 420, height: "100%", display: "flex", fontFamily: "'Inter', sans-serif" }}>
          {isDesktop && <SideNav tab={tab} setTab={setTab} currentUser={currentUser} avatarUrl={avatars[currentUser]} hasUnread={hasUnread} hasNewActivity={hasNewActivity} />}
          <div style={{ flex: 1, height: "100%", position: "relative", overflow: tab === "reels" ? "hidden" : "visible" }}>
            {tab === "reels" ? (
              <ReelsScreen posts={posts} avatars={avatars} toggleLike={toggleLike} addComment={addComment} onOpenProfile={handleOpenProfile} onDeletePost={handleDeletePost} onHashtagClick={openHashtagSearch} onMentionClick={openMentionedProfile} currentUser={currentUser} />
            ) : (
              <div style={{ height: "100%", overflowY: "auto" }}>
                <div style={{ maxWidth: isDesktop ? 600 : "100%", margin: isDesktop ? "0 auto" : 0 }}>
                  {tab === "feed" && (
                    <FeedScreen
                      posts={posts} avatars={avatars} toggleLike={toggleLike} addComment={addComment} onDeleteComment={handleDeleteComment}
                      onOpenMessages={() => setMessagesOpen(true)} onOpenProfile={handleOpenProfile} onDeletePost={handleDeletePost}
                      onEditPost={handleEditPost} onHashtagClick={openHashtagSearch} onMentionClick={openMentionedProfile}
                      currentUser={currentUser} youAvatar={avatars[currentUser]} hasUnread={hasUnread}
                      bookmarks={bookmarks} onToggleBookmark={handleToggleBookmark}
                    />
                  )}
                  {tab === "search" && <SearchScreen accounts={accounts} currentUser={currentUser} avatars={avatars} posts={posts} onViewProfile={handleOpenProfile} prefillQuery={searchPrefill} />}
                  {tab === "create" && <CreateScreen onPost={handlePost} />}
                  {tab === "activity" && <ActivityScreen items={activityItems} avatars={avatars} onOpenProfile={handleOpenProfile} />}
                  {tab === "messages" && <MessagesScreen convos={messagesList} onOpenThread={(id) => setActiveThread(id)} onBack={() => setTab("feed")} />}
                  {tab === "profile" && (
                    <ProfileScreen
                      currentUser={currentUser} avatarUrl={avatars[currentUser]} avatars={avatars} onAvatarChange={handleAvatarChange} onLogout={handleLogout}
                      posts={posts} toggleLike={toggleLike} addComment={addComment} onDeleteComment={handleDeleteComment} onDeletePost={handleDeletePost}
                      onEditPost={handleEditPost} onOpenProfile={handleOpenProfile} onHashtagClick={openHashtagSearch} onMentionClick={openMentionedProfile}
                      themeName={themeName} onThemeChange={handleThemeChange}
                      bio={bios[currentUser]} onBioChange={handleBioChange}
                      followerCount={followerCountFor(currentUser)} followingCount={followingCountFor(currentUser)}
                      bookmarks={bookmarks} onToggleBookmark={handleToggleBookmark}
                    />
                  )}
                </div>
              </div>
            )}
            {!isDesktop && <BottomNav tab={tab} setTab={setTab} hasUnread={hasUnread} hasNewActivity={hasNewActivity} />}
          </div>
        </div>
      )}
    </div>
    </ThemeContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Bjsenjer />);
</script>
</body>
</html>
